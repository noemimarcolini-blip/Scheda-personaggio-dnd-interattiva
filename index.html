    condCard.appendChild(hdrRow);

    // Grid di tutte le condizioni
    const allConds=Object.keys(CONDITIONS);
    const active=C.conditions||[];

    const grid=mk('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'8px'}});
    allConds.forEach(name=>{
      const isActive=active.includes(name);
      const chip=mk('div',{style:{
        display:'inline-flex',alignItems:'center',gap:'4px',
        border:'1px solid '+(isActive?'var(--rl)':'var(--border)'),
        borderRadius:'5px',padding:'3px 8px',cursor:'pointer',
        background:isActive?'rgba(139,32,32,0.25)':'rgba(0,0,0,0.2)',
        fontSize:'12px',fontFamily:'var(--fb)',
        color:isActive?'var(--rl)':'var(--td)',
        transition:'all 0.15s',userSelect:'none'
      }});
      if(isActive)chip.appendChild(mk('span',{style:{fontSize:'10px'}},['✦']));
      chip.appendChild(mk('span',null,[name]));
      chip.addEventListener('click',()=>{
        const idx=(C.conditions||[]).indexOf(name);
        if(idx>=0)C.conditions.splice(idx,1);
        else{if(!C.conditions)C.conditions=[];C.conditions.push(name);}
        save();
        const nc=buildConditionsCard();
        condCard.parentNode.replaceChild(nc,condCard);
      });
      grid.appendChild(chip);
    });
    condCard.appendChild(grid);

    // Lista condizioni attive con click per dettagli
    if(active.length>0){
      const activeHdr=mk('div',{style:{color:'var(--td)',fontSize:'10px',fontFamily:'var(--ft)',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:'5px'}},['Attive — clicca per effetti']);
      condCard.appendChild(activeHdr);
      const activeList=mk('div',{style:{display:'flex',flexDirection:'column',gap:'4px'}});
      active.forEach(name=>{
        const row=mk('div',{style:{
          display:'flex',alignItems:'center',gap:'6px',
          background:'rgba(139,32,32,0.15)',border:'1px solid var(--rl)',
          borderRadius:'5px',padding:'5px 8px',cursor:'pointer'
        }});
        row.appendChild(mk('span',{style:{color:'var(--rl)',fontSize:'14px'}},['⚠']));
        row.appendChild(mk('span',{style:{color:'var(--text)',fontFamily:'var(--fb)',fontSize:'13px',flex:'1'}},[name]));
        row.appendChild(mk('span',{style:{color:'var(--td)',fontSize:'11px'}},['ℹ']));
        row.addEventListener('click',()=>showConditionModal(name));
        activeList.appendChild(row);
      });
      condCard.appendChild(activeList);
    } else {
      condCard.appendChild(mk('div',{style:{color:'var(--tk)',fontSize:'12px',fontFamily:'var(--fb)',textAlign:'center',padding:'4px 0'}},['Nessuna condizione attiva']));
    }

    return condCard;
  }

  p.appendChild(buildConditionsCard());

  return p;
}

function pgSpells(){
  const spMod=sm(C[C.sca]||10);
  const p=mk('div',{cls:'page'});
  const caMap={A:'A',AB:'AB',R:'R'};
  const caCls={A:'cbA',AB:'cbAB',R:'cbR'};

  // Incantatore - DC e bonus attacco con modificatori addizionali
  if(!C.dcMods)C.dcMods=[];
  if(!C.attMods)C.attMods=[];
  const dcBase=8+(C.prof||2)+spMod;
  const dcTotal=dcBase+(C.dcMods||[]).filter(m=>m.on).reduce((a,m)=>a+(Number(m.v)||0),0);
  const attBase=(C.prof||2)+spMod;
  const attTotal=attBase+(C.attMods||[]).filter(m=>m.on).reduce((a,m)=>a+(Number(m.v)||0),0);
  const scaOpts=[['str','FOR'],['dex','DES'],['con','COS'],['int','INT'],['wis','SAG'],['cha','CAR']];

  function modSection(label,mods,key,total,baseVal){
    const modsDiv=mk('div',{style:{flex:'1'}});
    function refresh(){
      modsDiv.innerHTML='';
      const t=baseVal+(C[key]||[]).filter(m=>m.on).reduce((a,m)=>a+(Number(m.v)||0),0);
      modsDiv.appendChild(ROW([
        LBL(label),
        mk('div',{id:'spell-'+key+'-total',style:{color:'var(--gl)',fontFamily:'var(--ft)',fontSize:'20px',lineHeight:'1'}},[String(t)]),
        BTN('+',()=>{C[key].push({n:'',v:0,on:false});save();refresh();},'sm ghost',{marginLeft:'auto'})
      ],{alignItems:'center',gap:'6px',marginBottom:'4px'}));
      (C[key]||[]).forEach((m,i)=>{
        modsDiv.appendChild(ROW([
          CHK(!!m.on,v=>{C[key][i].on=v;save();refresh();}),
          TI(m.n||'',v=>{C[key][i].n=v;save();},'',{flex:'1',fontSize:'11px'}),
          NI(m.v||0,v=>{C[key][i].v=v;save();refresh();},undefined,undefined,{width:'40px'}),
          BTN('✕',()=>{C[key].splice(i,1);save();refresh();},'ghost sm')
        ],{marginBottom:'3px'}));
      });
    }
    refresh();
    return modsDiv;
  }

  const scaCard=CARD([
    ROW([LBL('Caratteristica Incantatore'),SEL(C.sca,scaOpts,v=>{C.sca=v;save();render();},{})],{gap:'8px',marginBottom:'8px',alignItems:'center'}),
    GRID([
      modSection('DC Incantesimi','dcMods','dcMods',dcTotal,dcBase),
      modSection('Bonus Attacco','attMods','attMods',attTotal,attBase),
    ],'1fr 1fr',10)
  ]);
  p.appendChild(scaCard);

  // Slot incantesimi
  const slotDiv=mk('div',{style:{marginTop:'6px'}});

  function buildSlotRow(lv,container){
    container.innerHTML='';
    const s=C.ss[lv]||{m:0,u:0};
    const avail=Math.max(0,s.m-s.u);
    // Dots (display only)
    const dotsDiv=mk('div',{style:{display:'flex',gap:'3px',flex:'1'}});
    for(let i=0;i<s.m;i++){
      dotsDiv.appendChild(mk('div',{cls:'slotc'+(i<avail?'':' used')}));
    }
    const cntEl=mk('span',{style:{color:avail===0&&s.m>0?'var(--rl)':'var(--td)',fontFamily:'var(--ft)',fontSize:'11px',minWidth:'32px',textAlign:'center'}},[avail+'/'+s.m]);
    const usaBtn=mk('button',{cls:'sm',style:{padding:'1px 6px',fontSize:'10px',opacity:avail===0?0.5:1}},['Usa']);
    usaBtn.addEventListener('click',()=>{if(C.ss[lv].u<C.ss[lv].m){C.ss[lv].u++;save();buildSlotRow(lv,container);}});
    const recBtn=mk('button',{cls:'sm ghost',style:{padding:'1px 5px',fontSize:'13px',opacity:s.u===0?0.4:1}},['↺']);
    recBtn.addEventListener('click',()=>{if(C.ss[lv].u>0){C.ss[lv].u--;save();buildSlotRow(lv,container);}});
    const maxI=mk('input',{type:'number',value:String(s.m),style:{width:'32px',fontSize:'11px',textAlign:'center',padding:'2px 4px'}});
    maxI.addEventListener('input',ev=>{
      const v=Math.max(0,Math.min(9,Number(ev.target.value)||0));
      C.ss[lv]={...C.ss[lv],m:v};
      if(C.ss[lv].u>v)C.ss[lv].u=v;
      save();
      // Update dots and counter WITHOUT rebuilding the row (keeps keyboard open)
      const s2=C.ss[lv];
      const avail2=Math.max(0,s2.m-s2.u);
      dotsDiv.innerHTML='';
      for(let i=0;i<s2.m;i++)dotsDiv.appendChild(mk('div',{cls:'slotc'+(i<avail2?'':' used')}));
      cntEl.textContent=avail2+'/'+s2.m;
      cntEl.style.color=avail2===0&&s2.m>0?'var(--rl)':'var(--td)';
    });
    container.appendChild(mk('span',{style:{color:'var(--td)',fontFamily:'var(--ft)',fontSize:'10px',width:'30px',flexShrink:0}},['Lv '+lv]));
    container.appendChild(dotsDiv);
    container.appendChild(cntEl);
    container.appendChild(usaBtn);
    container.appendChild(recBtn);
    container.appendChild(mk('span',{style:{color:'var(--tk)',fontSize:'10px',flexShrink:0}},['max']));
    container.appendChild(maxI);
  }

  for(let l=1;l<=9;l++){
    const rowEl=mk('div',{cls:'row',style:{marginBottom:'5px'}});
    buildSlotRow(l,rowEl);
    slotDiv.appendChild(rowEl);
  }

  const resetBtn=mk('button',{cls:'sm',style:{width:'100%',marginTop:'8px',color:'var(--greenl)',borderColor:'var(--green)',background:'rgba(42,107,58,0.15)'}},['↺ Riposo lungo — Recupera tutti gli slot']);
  resetBtn.addEventListener('click',()=>{
    for(let l=1;l<=9;l++){if(C.ss[l])C.ss[l].u=0;}
    save();
    Array.from(slotDiv.children).forEach((rowEl,idx)=>buildSlotRow(idx+1,rowEl));
  });

  p.appendChild(CARD([LBL('Slot Incantesimi'),slotDiv,resetBtn]));

  // Aggiungi con ricerca autocomplete
  let newLv=0,newN='';
  if(!C.spellEdition)C.spellEdition='2014';

  const edSel=SEL(C.spellEdition,[['2014','SRD 2014'],['2024','SRD 2024']],v=>{C.spellEdition=v;save();render();},{});

  const suggestDiv=mk('div',{style:{position:'absolute',left:0,right:0,top:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'4px',zIndex:200,maxHeight:'180px',overflowY:'auto',display:'none'}});

  const nInp=TI('',v=>{
    newN=v;
    // Show suggestions
    const SRD=C.spellEdition==='2024'?SRD24:SRD14;
    const q=v.toLowerCase().trim();
    suggestDiv.innerHTML='';
    if(q.length<2){suggestDiv.style.display='none';return;}
    const matches=Object.entries(SRD).filter(([k,sp])=>sp.it.toLowerCase().includes(q)||k.includes(q)).slice(0,8);
    if(!matches.length){suggestDiv.style.display='none';return;}
    matches.forEach(([k,sp])=>{
      const item=mk('div',{style:{padding:'6px 10px',cursor:'pointer',borderBottom:'1px solid var(--border)',fontSize:'12px',color:'var(--text)',fontFamily:'var(--fb)'}},
        [sp.it+(sp.lv===0?' (Trucchetto)':' (Lv '+sp.lv+')')]);
      item.addEventListener('mousedown',ev=>{ev.preventDefault();});
      item.addEventListener('click',()=>{
        nInp.value=sp.it;newN=sp.it;
        // Auto-set level
        const lvOpts=Array.from(lvSel.options);
        lvSel.value=String(sp.lv);newLv=sp.lv;
        suggestDiv.style.display='none';
      });
      item.addEventListener('mouseover',()=>item.style.background='rgba(201,168,76,0.15)');
      item.addEventListener('mouseout',()=>item.style.background='');
      suggestDiv.appendChild(item);
    });
    suggestDiv.style.display='block';
  },'Nome incantesimo...',{flex:'1'});

  nInp.addEventListener('blur',()=>setTimeout(()=>suggestDiv.style.display='none',200));

  const lvSel=mk('select',{style:{background:'var(--card)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:'4px',padding:'4px',fontSize:'12px',width:'80px'}});
  lvSel.appendChild(mk('option',{value:'0'},['Trucchetto']));
  for(let l=1;l<=9;l++)lvSel.appendChild(mk('option',{value:String(l)},['Lv '+l]));
  lvSel.addEventListener('change',ev=>newLv=Number(ev.target.value));

  const inputWrap=mk('div',{style:{flex:'1',position:'relative'}});
  inputWrap.appendChild(nInp);
  inputWrap.appendChild(suggestDiv);

  p.appendChild(CARD([
    ROW([LBL('Aggiungi Incantesimo'),ROW([mk('span',{style:{color:'var(--td)',fontSize:'11px'}},['Edizione:']),edSel],{gap:'4px'})],{justifyContent:'space-between',alignItems:'center'}),
    ROW([lvSel,inputWrap,BTN('+',()=>{
      const n=nInp.value.trim();if(!n)return;
      const lv=Number(lvSel.value)||newLv;
      if(lv===0)C.cn.push({n});else C.sl[lv].push({n,pr:false});
      nInp.value='';suggestDiv.style.display='none';save();render();
    },'gold')],{marginTop:'6px',gap:'6px'})
  ]));

  // Trucchetti
  if((C.cn||[]).length>0){
    const tCard=CARD([LBL('Trucchetti')]);
    C.cn.forEach((s,i)=>{
      const db=lkS(s.n);const cu=(C.csp||{})[(s.n||'').toLowerCase()]||null;const d=cu||db;
      const row=mk('div',{cls:'srow'});
      const nm=mk('span',{style:{flex:'1',color:d?'var(--gl)':'var(--text)',fontFamily:'var(--fb)',fontSize:'13px',cursor:'pointer',textDecoration:d?'underline':'none',textDecorationStyle:'dotted'}});
      nm.textContent=d?.it||s.n;
      nm.addEventListener('click',()=>showSpellModal(s.n));
      row.appendChild(nm);
      if(d?.ca)row.appendChild(mk('span',{cls:caCls[d.ca]||'cbA'},[d.ca]));
      if(d?.du&&d.du.includes('Conc'))row.appendChild(mk('span',{style:{background:'rgba(26,58,107,0.3)',border:'1px solid var(--blue)',color:'var(--bluel)',borderRadius:'3px',padding:'0 3px',fontSize:'9px',fontFamily:'monospace'}},['C']));
      if(d?.co){d.co.split(',').map(c=>c.trim()).filter(Boolean).forEach(c=>{row.appendChild(mk('span',{style:{background:'rgba(90,62,27,0.2)',border:'1px solid var(--border)',color:'var(--td)',borderRadius:'3px',padding:'0 3px',fontSize:'9px',fontFamily:'monospace'}},[c]));});};
      row.appendChild(BTN('✕',()=>{C.cn.splice(i,1);save();render();},'ghost sm'));
      tCard.appendChild(row);
    });
    p.appendChild(tCard);
  }

  // Livelli
  for(let l=1;l<=9;l++){
    const list=C.sl[l]||[];
    if(!list.length&&!(C.ss[l]?.m))continue;
    const lCard=CARD([LBL('Livello '+l)]);
    list.forEach((s,i)=>{
      const db=lkS(s.n);const cu=(C.csp||{})[(s.n||'').toLowerCase()]||null;const d=cu||db;
      const row=mk('div',{cls:'srow'});
      const chkEl=CHK(!!s.pr,v=>{C.sl[l][i].pr=v;save();render();});
      row.appendChild(chkEl);
      const nm=mk('span',{style:{flex:'1',color:d?'var(--gl)':'var(--text)',fontFamily:'var(--fb)',fontSize:'13px',cursor:'pointer',textDecoration:d?'underline':'none',textDecorationStyle:'dotted'}});
      nm.textContent=d?.it||s.n;
      nm.addEventListener('click',()=>showSpellModal(s.n));
      row.appendChild(nm);
      if(d?.ca)row.appendChild(mk('span',{cls:caCls[d.ca]||'cbA'},[d.ca]));
      if(d?.du&&d.du.includes('Conc'))row.appendChild(mk('span',{style:{background:'rgba(26,58,107,0.3)',border:'1px solid var(--blue)',color:'var(--bluel)',borderRadius:'3px',padding:'0 3px',fontSize:'9px',fontFamily:'monospace'}},['C']));
      if(d?.co){d.co.split(',').map(c=>c.trim()).filter(Boolean).forEach(c=>{row.appendChild(mk('span',{style:{background:'rgba(90,62,27,0.2)',border:'1px solid var(--border)',color:'var(--td)',borderRadius:'3px',padding:'0 3px',fontSize:'9px',fontFamily:'monospace'}},[c]));});};
      row.appendChild(BTN('✕',()=>{C.sl[l].splice(i,1);save();render();},'ghost sm'));
      lCard.appendChild(row);
    });
    p.appendChild(lCard);
  }
  return p;
}

function pgInventory(){
  const attCnt=(C.mi||[]).filter(i=>i.attuned===true).length;
  const slots=C.ats||3;
  const p=mk('div',{cls:'page'});

  // Monete
  const coinsCard=CARD([LBL('Monete'),
    GRID([['pp','#a8a8d8'],['gp','var(--gold)'],['ep','#90a8b0'],['sp','#b8b8b8'],['cp','#c87040']].map(([k,col])=>
      DIV([mk('div',{style:{color:col,fontFamily:'var(--ft)',fontSize:'11px',textAlign:'center'}},[{pp:'MP',gp:'MO',ep:'ME',sp:'MA',cp:'MR'}[k]||k.toUpperCase()]),NI((C.coins||{})[k]||0,v=>{C.coins[k]=v;save();},undefined,undefined,{width:'100%',color:col})])
    ),'repeat(5,1fr)',4,{marginTop:'6px'})
  ]);
  p.appendChild(coinsCard);

  // Sintonizzazione
  const dotsDiv=mk('div',{style:{display:'flex',gap:'3px'}});
  for(let i=0;i<slots;i++){
    dotsDiv.appendChild(mk('div',{style:{width:'12px',height:'12px',borderRadius:'50%',border:'2px solid var(--gold)',background:i<attCnt?'rgba(201,168,76,.7)':'transparent'}}));
  }
  p.appendChild(CARD([ROW([LBL('Sintonizzazione',{marginBottom:'0'}),NI(slots,v=>{C.ats=v;save();},undefined,undefined,{width:'36px'}),dotsDiv,mk('span',{style:{color:attCnt>slots?'var(--rl)':'var(--greenl)',fontFamily:'var(--ft)',fontSize:'13px'}},[attCnt+'/'+slots])],{flexWrap:'wrap',gap:'8px'})]));

  // Oggetti magici
  const mgCard=mk('div',{cls:'card',style:{border:'1px solid var(--purl)'}});
  mgCard.appendChild(mk('div',{style:{position:'absolute',top:'0',left:'0',right:'0',height:'2px',background:'linear-gradient(90deg,transparent,var(--purl),transparent)',borderRadius:'8px 8px 0 0'}}));
  mgCard.appendChild(ROW([LBL('✨ Oggetti Magici',{color:'var(--purl)'}),BTN('+ Aggiungi',()=>{C.mi.push({name:'',desc:'',rarity:'',type:'',requiresAttunement:false,attuned:false,bagOfHolding:false});save();render();showMagicModal(C.mi.length-1);},'sm')],{justifyContent:'space-between',alignItems:'center'}));
  (C.mi||[]).forEach((item,i)=>{
    const rarC={comune:'var(--td)',non_comune:'var(--greenl)',raro:'var(--bluel)','molto raro':'var(--purl)',leggendario:'var(--gl)'};
    const row=mk('div',{cls:'mgrow'});
    if(item.requiresAttunement){
      const d=mk('div',{cls:'dotc'+(item.attuned?' on':'')});
      d.addEventListener('click',()=>{C.mi[i].attuned=!item.attuned;save();render();});
      row.appendChild(d);
    }else{row.appendChild(mk('div',{style:{width:'13px'}}));}
    const nm=mk('span',{style:{flex:'1',color:'var(--purl)',fontFamily:'var(--fb)',fontSize:'13px',cursor:'pointer',textDecoration:'underline',textDecorationStyle:'dotted'}});
    nm.textContent=item.name||'(senza nome)';
    nm.addEventListener('click',()=>showMagicModal(i));
    row.appendChild(nm);
    if(item.rarity)row.appendChild(mk('span',{style:{color:rarC[item.rarity]||'var(--td)',fontSize:'11px'}},['●']));
    if(item.attuned)row.appendChild(mk('span',{style:{color:'var(--gold)',fontSize:'10px'}},['✦']));
    if(item.bagOfHolding){const bagBtn=mk('span',{style:{color:'var(--bluel)',fontSize:'10px',cursor:'pointer',border:'1px solid var(--bluel)',borderRadius:'8px',padding:'0 4px'}},['🎒 Borsa']);bagBtn.title='Rimuovi da Borsa Conservante';bagBtn.addEventListener('click',()=>{C.mi[i].bagOfHolding=false;save();render();});row.appendChild(bagBtn);}
    else{const bagBtn=mk('span',{style:{color:'var(--tk)',fontSize:'10px',cursor:'pointer',border:'1px solid var(--border)',borderRadius:'8px',padding:'0 4px'}},['🎒']);bagBtn.title='Metti nella Borsa Conservante';bagBtn.addEventListener('click',()=>{C.mi[i].bagOfHolding=true;save();render();});row.appendChild(bagBtn);}
    row.appendChild(BTN('✕',()=>{C.mi.splice(i,1);save();render();},'ghost sm'));
    mgCard.appendChild(row);
  });
  if(!(C.mi||[]).length)mgCard.appendChild(mk('div',{style:{color:'var(--tk)',fontSize:'12px',textAlign:'center',padding:'8px'}},['Nessun oggetto — clicca + per aggiungere']));
  p.appendChild(mgCard);

  // Sezioni generali
  function genSec(title,key,fields,def){
    const card=CARD([ROW([LBL(title),BTN('+ Aggiungi',()=>{C[key].push({...def});save();render();},'sm')],{justifyContent:'space-between',alignItems:'center'})]);
    (C[key]||[]).forEach((item,i)=>{
      const irow=mk('div',{cls:'irow'});
      const bcTog=mk('span',{style:{fontSize:'11px',cursor:'pointer',flexShrink:0,color:item.borsa?'var(--bluel)':'var(--tk)',border:'1px solid '+(item.borsa?'var(--bluel)':'var(--border)'),borderRadius:'10px',padding:'1px 6px',whiteSpace:'nowrap',fontFamily:'var(--fb)'}},['🎒 Borsa']);
      bcTog.addEventListener('click',()=>{C[key][i].borsa=!item.borsa;save();render();});
      const hrow=ROW([
        TI(item.name||'',v=>{C[key][i].name=v;save();},'Nome',{flex:'1',fontSize:'12px'}),
        fields.includes('qty')&&NI(item.qty||1,v=>{C[key][i].qty=v;save();},undefined,undefined,{width:'42px'}),
        bcTog,
        BTN(item._exp?'▲':'▼',()=>{C[key][i]._exp=!item._exp;save();render();},'ghost sm'),
        BTN('✕',()=>{C[key].splice(i,1);save();render();},'ghost sm')
      ].filter(Boolean));
      irow.appendChild(hrow);
      if(item._exp){
        const exp=mk('div',{style:{marginTop:'5px',display:'flex',flexDirection:'column',gap:'4px'}});
        if(fields.includes('weight'))exp.appendChild(DIV([LBL('Peso (kg)'),TI(item.weight||'',v=>{C[key][i].weight=v;save();},'kg',{})]));
        exp.appendChild(DIV([LBL('Note'),TA(item.desc||'',v=>{C[key][i].desc=v;save();})]));

        irow.appendChild(exp);
      }
      card.appendChild(irow);
    });
    return card;
  }
  p.appendChild(genSec('⚔ Armi','wea',['qty','weight'],{name:'',qty:1,weight:'',desc:''}));
  p.appendChild(genSec('🛡 Armature','arm',['weight'],{name:'',weight:'',desc:''}));
  p.appendChild(genSec('🧪 Consumabili','con_',['qty'],{name:'',qty:1,desc:''}));
  p.appendChild(genSec('💎 Oggetti di Valore','val',['qty'],{name:'',qty:1,desc:''}));
  p.appendChild(genSec('🎒 Inventario','gen',['qty','weight'],{name:'',qty:1,weight:'',desc:''}));
  return p;
}

function pgPersonality(){
  const p=mk('div',{cls:'page'});

  // Character image
  const imgCard=CARD([]);
  const imgContainer=mk('div',{style:{textAlign:'center',marginBottom:'8px'}});
  if(C.img){
    const imgEl=mk('img',{src:C.img,style:{maxWidth:'100%',maxHeight:'200px',borderRadius:'8px',border:'2px solid var(--border)',objectFit:'cover'}});
    imgContainer.appendChild(imgEl);
    imgContainer.appendChild(mk('br'));
    imgContainer.appendChild(BTN('🗑 Rimuovi',()=>{C.img='';save();render();},'ghost sm',{marginTop:'6px'}));
  } else {
    imgContainer.appendChild(mk('div',{style:{width:'100%',height:'120px',border:'2px dashed var(--border)',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--tk)',fontFamily:'var(--fb)',fontSize:'13px',cursor:'pointer'}},['📷 Carica immagine personaggio']));
  }
  const fileInp=mk('input',{type:'file',accept:'image/*',style:{display:'none',width:'auto'}});
  fileInp.addEventListener('change',ev=>{
    const f=ev.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=e=>{C.img=e.target.result;save();render();};
    reader.readAsDataURL(f);
  });
  imgContainer.addEventListener('click',()=>fileInp.click());
  imgCard.appendChild(imgContainer);
  imgCard.appendChild(fileInp);
  p.appendChild(imgCard);

function pgCombo(){
  const p=mk('div',{cls:'page'});
  if(!C.combos)C.combos=[];

  // Collect all spells from spell page
  function getAllSpells(){
    const all=[];
    (C.cn||[]).forEach(s=>{
      const db=lkS(s.n);const cu=(C.csp||{})[s.n?.toLowerCase()]||null;const d=cu||db;
      all.push({n:s.n,label:d?.it||s.n,lv:0,conc:!!(d?.du&&d.du.includes('Conc')),ca:d?.ca||''});
    });
    for(let l=1;l<=9;l++){
      (C.sl[l]||[]).forEach(s=>{
        const db=lkS(s.n);const cu=(C.csp||{})[s.n?.toLowerCase()]||null;const d=cu||db;
        all.push({n:s.n,label:d?.it||s.n,lv:l,conc:!!(d?.du&&d.du.includes('Conc')),ca:d?.ca||''});
      });
    }
    return all;
  }

  function hasConcentration(steps){
    return steps.some(st=>st.type==='spell'&&st.conc);
  }

  function renderCombo(combo,ci){
    const card=CARD([]);
    // Header: nome combo + pulsanti
    const isOpen=combo._open!==false; // default open
    const toggleBtn=mk('span',{style:{color:'var(--td)',fontSize:'12px',cursor:'pointer',userSelect:'none',flexShrink:0}},[ isOpen?'▲':'▼' ]);
    const nameI=TI(combo.name||'',v=>{C.combos[ci].name=v;save();},'Nome combo...',{flex:'1',fontFamily:'var(--ft)',fontSize:'14px',color:'var(--gl)',background:'transparent',border:'none',borderBottom:'1px solid var(--border)',borderRadius:'0'});
    // Click on name or arrow to toggle
    function toggleCombo(){C.combos[ci]._open=!isOpen;save();render();}
    toggleBtn.addEventListener('click',toggleCombo);
    card.appendChild(ROW([toggleBtn,nameI,BTN('✕',()=>{C.combos.splice(ci,1);save();render();},'ghost sm')],{marginBottom:'10px',gap:'6px'}));

    // Steps
    const stepsDiv=mk('div');
    (combo.steps||[]).forEach((st,si)=>{
      const stepEl=mk('div',{style:{background:'rgba(0,0,0,0.3)',border:'1px solid var(--border)',borderRadius:'6px',padding:'8px',marginBottom:'6px'}});

      // Step header: numero + tipo + costo azione + riordina + elimina
      const actCost=st.type==='spell'?(st.ca||'A'):st.actCost||'A';
      const actColor={'A':'var(--greenl)','AB':'var(--bluel)','R':'var(--rl)','—':'var(--td)'}[actCost]||'var(--td)';
      const actLabel={'A':'Azione','AB':'Az. Bonus','R':'Reazione','—':'—'}[actCost]||actCost;
      const moveRow=ROW([
        mk('span',{style:{color:'var(--gold)',fontFamily:'var(--ft)',fontSize:'11px',minWidth:'18px'}},[(si+1)+'.']),
        mk('span',{style:{color:'var(--td)',fontSize:'11px',flex:'1'}},[st.type==='spell'?'🔮 Incantesimo':st.type==='action'?'⚔ Azione':'📝 Altro']),
        mk('span',{style:{background:actColor==='var(--td)'?'transparent':'rgba(0,0,0,0.3)',border:'1px solid '+actColor,borderRadius:'3px',padding:'0 5px',fontSize:'10px',color:actColor,fontFamily:'monospace',flexShrink:0}},[actLabel]),
        si>0&&BTN('↑',()=>{const tmp=combo.steps[si-1];C.combos[ci].steps[si-1]=st;C.combos[ci].steps[si]=tmp;save();render();},'ghost sm'),
        si<combo.steps.length-1&&BTN('↓',()=>{const tmp=combo.steps[si+1];C.combos[ci].steps[si+1]=st;C.combos[ci].steps[si]=tmp;save();render();},'ghost sm'),
        BTN('✕',()=>{C.combos[ci].steps.splice(si,1);save();render();},'ghost sm'),
      ].filter(Boolean));
      stepEl.appendChild(moveRow);

      if(st.type==='spell'){
        // Spell selector
        const allSpells=getAllSpells();
        const concAlready=combo.steps.slice(0,si).some(s=>s.type==='spell'&&s.conc);
        const available=concAlready?allSpells.filter(s=>!s.conc):allSpells;

        if(available.length===0){
          stepEl.appendChild(mk('div',{style:{color:'var(--rl)',fontSize:'12px',marginTop:'6px'}},['⚠ Concentrazione già attiva — nessun altro incantesimo di concentrazione disponibile']));
        } else {
          // ── Tipo azione (sempre visibile) ──
          stepEl.appendChild(mk('div',{style:{color:'var(--td)',fontSize:'10px',marginTop:'6px',marginBottom:'2px'}},['Tipo di azione:']));
          stepEl.appendChild(SEL(st.ca||'A',[['A','⚔ Azione'],['AB','⚡ Azione Bonus'],['R','🔄 Reazione'],['special','✦ Speciale']],v=>{
            C.combos[ci].steps[si].ca=v;save();render();
          },{width:'100%'}));
          // ── Incantesimo ──
          stepEl.appendChild(mk('div',{style:{color:'var(--td)',fontSize:'10px',marginTop:'6px',marginBottom:'2px'}},['Incantesimo:']));
          const opts=[['','— Scegli incantesimo —'],...available.map(s=>[s.n,s.label+(s.lv===0?' (Trucchetto)':' (Lv '+s.lv+')')+(s.conc?' [C]':'')])];
          const sel=SEL(st.spell||'',opts,v=>{
            const sp=available.find(s=>s.n===v);
            C.combos[ci].steps[si].spell=v;
            C.combos[ci].steps[si].conc=sp?.conc||false;
            C.combos[ci].steps[si].label=sp?.label||v;
            save();render();
          },{width:'100%'});
          stepEl.appendChild(sel);
          if(st.conc){
            stepEl.appendChild(mk('div',{style:{color:'var(--bluel)',fontSize:'11px',marginTop:'4px'}},['🔵 Questo incantesimo richiede concentrazione']));
          }
        }
      } else {
        // Action cost selector for non-spell steps
        const costSel=SEL(st.actCost||'A',[['A','Azione'],['AB','Azione Bonus'],['R','Reazione'],['—','Nessuna']],v=>{C.combos[ci].steps[si].actCost=v;save();render();},{width:'100%',marginTop:'6px'});
        stepEl.appendChild(costSel);
        const descI=TI(st.desc||'',v=>{C.combos[ci].steps[si].desc=v;save();},'Descrivi l\'azione...',{width:'100%',marginTop:'4px'});
        stepEl.appendChild(descI);
      }

      // Note per lo step
      const noteI=TI(st.note||'',v=>{C.combos[ci].steps[si].note=v;save();},'Note (opzionale)...',{width:'100%',marginTop:'4px',fontSize:'11px',color:'var(--td)'});
      stepEl.appendChild(noteI);

      stepsDiv.appendChild(stepEl);
    });
    if(isOpen){
      card.appendChild(stepsDiv);

      // Action summary warning
      const steps=combo.steps||[];
      const aCount=steps.filter(s=>(s.type==='spell'?(s.ca||'A'):s.actCost||'A')==='A').length;
      const abCount=steps.filter(s=>(s.type==='spell'?(s.ca||'A'):s.actCost||'A')==='AB').length;
      const rCount=steps.filter(s=>(s.type==='spell'?(s.ca||'A'):s.actCost||'A')==='R').length;
      if(steps.length>0){
        const warns=[];
        if(aCount>1)warns.push('⚠ '+aCount+' Azioni (hai solo 1 per turno)');
        if(abCount>1)warns.push('⚠ '+abCount+' Azioni Bonus (hai solo 1 per turno)');
        if(rCount>1)warns.push('⚠ '+rCount+' Reazioni (hai solo 1 per round)');
        const summary=[];
        if(aCount)summary.push(aCount+'× Azione');
        if(abCount)summary.push(abCount+'× Az. Bonus');
        if(rCount)summary.push(rCount+'× Reazione');
        const sumDiv=mk('div',{style:{marginTop:'8px',marginBottom:'4px',padding:'6px 8px',background:'rgba(0,0,0,0.3)',borderRadius:'4px'}});
        sumDiv.appendChild(mk('div',{style:{color:'var(--td)',fontSize:'11px'}},[summary.join(' · ')||'Nessuna azione']));
        warns.forEach(w=>sumDiv.appendChild(mk('div',{style:{color:'var(--rl)',fontSize:'11px',marginTop:'2px'}},[w])));
        card.appendChild(sumDiv);
      }

      // Add step buttons
      card.appendChild(ROW([
        BTN('+ Incantesimo',()=>{if(!C.combos[ci].steps)C.combos[ci].steps=[];C.combos[ci].steps.push({type:'spell',spell:'',label:'',conc:false,note:''});save();render();},'sm gold'),
        BTN('+ Azione',()=>{if(!C.combos[ci].steps)C.combos[ci].steps=[];C.combos[ci].steps.push({type:'action',desc:'',note:''});save();render();},'sm'),
        BTN('+ Altro',()=>{if(!C.combos[ci].steps)C.combos[ci].steps=[];C.combos[ci].steps.push({type:'other',desc:'',note:''});save();render();},'sm ghost'),
      ],{gap:'6px',marginTop:'8px',flexWrap:'wrap'}));
    } else {
      // Collapsed: show step count summary
      const cnt=(combo.steps||[]).length;
      if(cnt>0)card.appendChild(mk('div',{style:{color:'var(--td)',fontSize:'11px',marginTop:'-4px'}},[cnt+' step'+(cnt!==1?'s':'')]));
    }

    return card;
  }

  // Header pagina
  p.appendChild(ROW([
    mk('span',{style:{color:'var(--gold)',fontFamily:'var(--ft)',fontSize:'14px'}},['⚡ Combo']),
    BTN('+ Nuova Combo',()=>{C.combos.push({name:'',steps:[]});save();render();},'gold sm')
  ],{justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}));

  if(!C.combos||C.combos.length===0){
    p.appendChild(mk('div',{style:{color:'var(--tk)',fontSize:'13px',textAlign:'center',padding:'24px',fontFamily:'var(--fb)'}},[
      'Nessuna combo — clicca + per crearne una.',mk('br'),'Una combo è una sequenza di azioni/incantesimi da eseguire in ordine.'
    ]));
  } else {
    C.combos.forEach((combo,ci)=>p.appendChild(renderCombo(combo,ci)));
  }

  return p;
}

function pgSettings(){
  const p=mk('div',{cls:'page'});
  if(!C.hiddenPages)C.hiddenPages=[];
  const optionalPages=['combo','diario','world','personality'];
  const labels={combo:'⚡ Combo',diario:'📓 Diario',world:'🗺 Mondo',personality:'🎭 Personalità'};
  const card=CARD([LBL('Pagine Visibili')]);
  const desc=mk('div',{style:{color:'var(--td)',fontSize:'12px',marginBottom:'10px',lineHeight:'1.6'}});
  desc.textContent='Attiva o disattiva le pagine opzionali. Le pagine disattivate non appariranno nella barra di navigazione.';
  card.appendChild(desc);
  optionalPages.forEach(id=>{
    const isHidden=(C.hiddenPages||[]).includes(id);
    const row=mk('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid rgba(90,62,27,.2)'}});
    row.appendChild(mk('span',{style:{fontFamily:'var(--fb)',fontSize:'14px',color:'var(--text)'}},[labels[id]]));
    const tog=mk('button',{cls:'sm '+(isHidden?'ghost':'gold'),style:{minWidth:'64px'}},[ isHidden?'Disattiva... no, Attiva':'Attiva']);
    tog.textContent=isHidden?'Attiva':'Disattiva';
    tog.addEventListener('click',()=>{
      if(!C.hiddenPages)C.hiddenPages=[];
      if(isHidden){C.hiddenPages=C.hiddenPages.filter(x=>x!==id);}
      else{C.hiddenPages.push(id);if(PG===id){PG='main';C._lastPage='main';}}
      save();render();
    });
    row.appendChild(tog);
    card.appendChild(row);
  });
  p.appendChild(card);
  return p;
}
function updateHdr(){
  document.getElementById('hn').textContent=C.name||'Nuovo Personaggio';
  document.getElementById('hs').textContent=[C.cls,C.sub,C.lv&&'Lv '+C.lv].filter(Boolean).join(' · ');
  const cur=PAGES.find(pg=>pg.id===PG);
  document.getElementById('hp').textContent=cur?.tx||'';
}
function renderNav(){
  const nav=document.getElementById('nav-inner');
  nav.innerHTML='';
  const hiddenPages=C.hiddenPages||[];
  PAGES.filter(pg=>pg.id==='settings'||!hiddenPages.includes(pg.id)).forEach(pg=>{
    const b=mk('button',{cls:'nb'+(PG===pg.id?' on':'')});
    b.appendChild(mk('span',{cls:'ic'},[pg.ic]));
    b.appendChild(mk('span',{cls:'tx'},[pg.tx]));
    b.addEventListener('click',()=>{PG=pg.id;C._lastPage=pg.id;save();render();});
    nav.appendChild(b);
  });
}
function render(){
  const ct=document.getElementById('content');
  ct.innerHTML='';
  let pg;
  switch(PG){
    case 'main':pg=pgMain();break;
    case 'skills':pg=pgSkills();break;
    case 'combat':pg=pgCombat();break;
    case 'spells':pg=pgSpells();break;
    case 'inventory':pg=pgInventory();break;
    case 'personality':pg=pgPersonality();break;
    case 'combo':pg=pgCombo();break;
    case 'diario':pg=pgDiario();break;
    case 'world':pg=pgWorld();break;
    case 'homebrew':pg=pgHomebrew();break;
    case 'settings':pg=pgSettings();break;
    default:pg=pgMain();
  }
  ct.appendChild(pg);
  updateHdr();
  renderNav();
  // Notifica Supabase del cambiamento dati
  if(typeof sbOnCharChange==='function') sbOnCharChange();
}

// ── EXPORT / IMPORT ──
function doExport(){
  saveNow();
  const b=new Blob([JSON.stringify(C,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download=(C.name||'personaggio')+'_dnd.json';a.click();URL.revokeObjectURL(u);
}
function doImport(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);C={...JSON.parse(JSON.stringify(DEF)),...d};save();render();}catch{alert('File non valido');}};
  r.readAsText(f);ev.target.value='';
}

// ── THEME ──
function applyTheme(){
  const light=localStorage.getItem('dnd-theme')==='light';
  document.body.classList.toggle('light',light);
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=light?'🌙':'☀';
}
function toggleTheme(){
  const light=localStorage.getItem('dnd-theme')==='light';
  localStorage.setItem('dnd-theme',light?'dark':'light');
  applyTheme();
}

// ── INIT ──
load();applyTheme();
// render() verrà chiamato da Supabase dopo il controllo auth

if(typeof sb === 'undefined') render();

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║              SUPABASE — CONFIGURAZIONE                       ║
// ║  ⚠️  SOSTITUISCI I VALORI QUI SOTTO CON I TUOI!             ║
// ╚══════════════════════════════════════════════════════════════╝
const SUPABASE_URL = 'https://cxxxiobqgfjpiitqelzf.supabase.co';   // es: https://abc123xyz.supabase.co
const SUPABASE_KEY = 'sb_publishable_pTbauTK629bSw9FG2qZJuw_dD_OUxt-';      // la chiave lunga che inizia con eyJ...

// ── Variabili di stato ──
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let sbUser        = null;
let sbSchedaId    = null;
let sbSaveTimer   = null;
const SB_MAX_SCHEDE = 10;

// ╔══════════════════════════════════════════════════════════════╗
// ║              STATO SYNC NELL'HEADER                          ║
// ╚══════════════════════════════════════════════════════════════╝
function sbUpdateSync(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    saving:  { text: '⟳ Salvataggio...', color: 'var(--td)'    },
    saved:   { text: '✓ Salvato',         color: 'var(--greenl)' },
    error:   { text: '✗ Errore sync',     color: 'var(--rl)'    },
    offline: { text: '⚡ Offline',         color: 'var(--gold)'  },
  };
  const s = map[status];
  if (!s) { el.textContent = ''; return; }
  el.textContent   = s.text;
  el.style.color   = s.color;
  el.style.display = 'inline';
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              SALVATAGGIO CLOUD                               ║
// ╚══════════════════════════════════════════════════════════════╝
async function sbSaveToCloud() {
  if (!sbUser || !sbSchedaId) return;
  sbUpdateSync('saving');
  const { error } = await sb.from('schede')
    .update({
      data:        C,
      nome_scheda: C.name || 'Senza Nome',
      updated_at:  new Date().toISOString(),
    })
    .eq('id',      sbSchedaId)
    .eq('user_id', sbUser.id);
  if (error) {
    console.error('Errore salvataggio:', error);
    sbUpdateSync('error');
  } else {
    sbUpdateSync('saved');
    try { localStorage.setItem('dnd5_cloud_backup', JSON.stringify(C)); } catch(e) {}
  }
}

// Chiamata da render() ad ogni aggiornamento dati
function sbOnCharChange() {
  // localStorage già gestito da save() dell'app originale
  if (!sbUser || !sbSchedaId) return;
  sbUpdateSync('saving');
  clearTimeout(sbSaveTimer);
  sbSaveTimer = setTimeout(() => sbSaveToCloud(), 1500);
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              SCHERMATA SELEZIONE PERSONAGGIO                 ║
// ╚══════════════════════════════════════════════════════════════╝
function sbShowCharSelect(schede) {
  document.getElementById('nav').style.display = 'none';
  const ct = document.getElementById('content');
  ct.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.style.cssText = 'min-height:100vh;background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:32px 16px 100px;';

  wrap.innerHTML = `
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-family:var(--ft);font-size:20px;color:var(--gl);letter-spacing:2px">⚔ I Tuoi Personaggi</div>
      <div style="color:var(--td);font-size:11px;margin-top:6px">${sbUser.email}</div>
    </div>

    <div id="sb-schede-list" style="width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px">
      ${schede.length === 0 ? `
        <div style="text-align:center;color:var(--td);font-size:13px;padding:40px 0;line-height:1.8">
          Nessun personaggio ancora.<br>Creane uno nuovo!
        </div>
      ` : schede.map(s => `
        <div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;gap:12px;cursor:pointer;transition:border-color 0.2s"
          onclick="sbOpenScheda('${s.id}')"
          onmouseover="this.style.borderColor='var(--gl)'"
          onmouseout="this.style.borderColor='var(--border)'">
          <div style="flex:1;min-width:0">
            <div style="font-family:var(--ft);color:var(--gl);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${sbEsc(s.data?.name) || '— Senza Nome —'}
            </div>
            <div style="color:var(--td);font-size:11px;margin-top:3px">
              ${sbEsc(s.data?.race)||''} ${sbEsc(s.data?.cls)||''}${s.data?.lv ? ' · Liv. '+s.data.lv : ''}
            </div>
            <div style="color:var(--tk);font-size:10px;margin-top:2px">
              Modificato: ${new Date(s.updated_at).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0">
            <button class="sm gold" onclick="event.stopPropagation();sbOpenScheda('${s.id}')">Apri</button>
            <button class="sm ghost" style="color:var(--rl);border-color:var(--red)"
              onclick="event.stopPropagation();sbDeleteScheda('${s.id}',this)">Elimina</button>
          </div>
        </div>
      `).join('')}
    </div>

    ${schede.length < SB_MAX_SCHEDE ? `
      <button class="gold" style="margin-top:24px;padding:11px 32px;font-family:var(--ft);font-size:13px;letter-spacing:1.5px"
        onclick="sbCreateScheda()">+ Nuovo Personaggio</button>
      <div style="color:var(--tk);font-size:10px;margin-top:8px">${schede.length} / ${SB_MAX_SCHEDE} personaggi</div>
    ` : `
      <div style="color:var(--td);font-size:12px;margin-top:24px;text-align:center;max-width:280px;line-height:1.6">
        Hai raggiunto il limite di <strong style="color:var(--gl)">${SB_MAX_SCHEDE}</strong> personaggi.<br>
        Elimina una scheda per crearne una nuova.
      </div>
    `}

    <button class="ghost" style="margin-top:20px;font-size:11px;color:var(--td)" onclick="sbSignOut()">
      Esci dall'account
    </button>
  `;

  ct.appendChild(wrap);
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              APRI UNA SCHEDA                                 ║
// ╚══════════════════════════════════════════════════════════════╝
async function sbOpenScheda(schedaId) {
  const ct = document.getElementById('content');
  ct.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--td);font-family:var(--ft);font-size:13px;letter-spacing:1px">⟳ Caricamento...</div>`;

  const { data, error } = await sb.from('schede').select('*').eq('id', schedaId).single();

  if (error || !data) {
    alert('Errore nel caricare la scheda. Riprova.');
    sbLoadSchedeList();
    return;
  }

  sbSchedaId = schedaId;

  // Carica i dati nella variabile globale C dell'app
  const savedData = data.data || {};
  C = { ...JSON.parse(JSON.stringify(DEF)), ...savedData };

  // Ripristina interfaccia normale
  document.getElementById('nav').style.display = '';
  ct.innerHTML = '';

  render();
  sbUpdateSync('saved');
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              CREA NUOVA SCHEDA                               ║
// ╚══════════════════════════════════════════════════════════════╝
async function sbCreateScheda() {
  reset(); // funzione originale dell'app

  const { data, error } = await sb.from('schede')
    .insert({ user_id: sbUser.id, nome_scheda: 'Nuovo Personaggio', data: C })
    .select()
    .single();

  if (error) {
    alert('Errore nella creazione: ' + error.message);
    return;
  }

  sbSchedaId = data.id;
  document.getElementById('nav').style.display = '';
  document.getElementById('content').innerHTML = '';
  render();
  sbUpdateSync('saved');
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              ELIMINA SCHEDA                                  ║
// ╚══════════════════════════════════════════════════════════════╝
async function sbDeleteScheda(schedaId, btn) {
  if (!confirm('Eliminare questo personaggio?\nQuesta azione è irreversibile.')) return;
  const orig = btn.textContent;
  btn.textContent = '...';
  btn.disabled = true;

  const { error } = await sb.from('schede').delete().eq('id', schedaId);

  if (error) {
    alert('Errore nell\'eliminazione: ' + error.message);
    btn.textContent = orig;
    btn.disabled = false;
    return;
  }
  sbLoadSchedeList();
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              CARICA LISTA SCHEDE                             ║
// ╚══════════════════════════════════════════════════════════════╝
async function sbLoadSchedeList() {
  sbSchedaId = null;
  document.getElementById('nav').style.display = 'none';
  document.getElementById('content').innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--td);font-family:var(--ft);font-size:13px;letter-spacing:1px">
      ⟳ Caricamento schede...
    </div>`;

  const { data, error } = await sb.from('schede')
    .select('*')
    .eq('user_id', sbUser.id)
    .order('updated_at', { ascending: false });

  if (error) { alert('Errore nel caricare le schede: ' + error.message); return; }
  sbShowCharSelect(data || []);
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              CAMBIO SCHEDA DALL'HEADER                       ║
// ╚══════════════════════════════════════════════════════════════╝
async function sbSwitchScheda() {
  if (sbSchedaId) await sbSaveToCloud();
  sbLoadSchedeList();
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              SCHERMATA LOGIN                                 ║
// ╚══════════════════════════════════════════════════════════════╝
function sbShowLogin() {
  document.getElementById('nav').style.display = 'none';
  document.getElementById('content').innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px 24px;text-align:center">
      <div style="font-family:var(--ft);font-size:26px;color:var(--gl);letter-spacing:3px;line-height:1.4">⚔<br>D&amp;D Scheda</div>
      <div style="color:var(--td);font-size:13px;max-width:280px;line-height:1.7">
        Accedi per salvare i tuoi personaggi nel cloud e accedervi da qualsiasi dispositivo.
      </div>
      <button class="gold" style="padding:13px 36px;font-family:var(--ft);font-size:13px;letter-spacing:1.5px;margin-top:8px"
        onclick="sbSignIn()">☁ Accedi con Google</button>
      <div style="color:var(--tk);font-size:11px">I tuoi dati sono privati e accessibili solo da te.</div>
    </div>`;
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              AUTH                                            ║
// ╚══════════════════════════════════════════════════════════════╝
async function sbSignIn() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
  if (error) alert('Errore nel login: ' + error.message);
}

async function sbSignOut() {
  if (sbSchedaId) await sbSaveToCloud();
  await sb.auth.signOut();
  sbUser     = null;
  sbSchedaId = null;
  location.reload();
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              UTILITY                                         ║
// ╚══════════════════════════════════════════════════════════════╝
function sbEsc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ╔══════════════════════════════════════════════════════════════╗
// ║              AVVIO — GESTISCE LA SESSIONE                    ║
// ╚══════════════════════════════════════════════════════════════╝
sb.auth.onAuthStateChange(async (event, session) => {
  const loginBtn = document.getElementById('login-btn');
  const userInfo = document.getElementById('user-info');
  const userName = document.getElementById('user-name');
  const syncEl   = document.getElementById('sync-status');

  if (session?.user) {
    // ── LOGGATO ──
    sbUser = session.user;
    if (loginBtn) loginBtn.style.display  = 'none';
    if (userInfo) userInfo.style.display  = 'flex';
    if (userName) userName.textContent    = sbUser.email.split('@')[0];
    if (syncEl)   syncEl.style.display    = 'inline';
    sbLoadSchedeList();
  } else {
    // ── NON LOGGATO ──
    sbUser     = null;
    sbSchedaId = null;
    if (loginBtn) loginBtn.style.display  = 'inline-block';
    if (userInfo) userInfo.style.display  = 'none';
    if (syncEl)   syncEl.style.display    = 'none';
    sbShowLogin();
  }
});

// Salvataggio prima di chiudere la pagina
window.addEventListener('beforeunload', () => {
  if (sbUser && sbSchedaId) sbSaveToCloud();
});
</script>
