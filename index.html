<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Scheda D&D 2014</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0c09;--paper:#1a1610;--card:#221e16;--border:#5a3e1b;
  --gold:#c9a84c;--gl:#e8c96a;--gd:#7a6030;
  --red:#8b2020;--rl:#c94040;--green:#2a6b3a;--greenl:#4aab5a;
  --blue:#1a3a6b;--bluel:#4a7acb;
  --text:#e8dcc8;--td:#9a8870;--tk:#5a5040;
  --pur:#4a2080;--purl:#8a50c0;
  --ft:'Cinzel Decorative',serif;--fb:'Crimson Text',serif;
}
body.light{
  --bg:#f5f0e8;--paper:#ede5d8;--card:#e8dfc8;--border:#b89060;
  --gold:#8a5e1a;--gl:#6b4010;--gd:#a07030;
  --red:#8b2020;--rl:#c94040;--green:#1a5a28;--greenl:#2a8a3a;
  --blue:#1a3a8b;--bluel:#2a5acb;
  --text:#2a2010;--td:#6a5030;--tk:#9a8060;
  --pur:#4a2080;--purl:#6a40b0;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);overflow-x:hidden}
*{box-sizing:border-box}
input,textarea,select{background:rgba(0,0,0,0.07);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--fb);font-size:14px;padding:4px 8px;outline:none;width:100%}body.light input,body.light textarea,body.light select{background:rgba(255,255,255,0.7)}
input[type=number]{width:58px;text-align:center;padding:4px 6px}@media(min-width:500px){input[type=number]{width:72px;padding:4px 8px}}
input[type=number]::-webkit-inner-spin-button{opacity:1}
textarea{resize:vertical;min-height:60px;font-family:var(--fb)}
select option{background:var(--card)}
button{background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--fb);font-size:13px;padding:5px 12px;cursor:pointer;flex-shrink:0}body.light .irow,body.light .srow,body.light .mgrow{background:rgba(255,255,255,0.4)}
button.gold{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold)}
button.ghost{background:transparent;border-color:transparent;color:var(--td)}
button.sm{font-size:11px;padding:2px 8px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gd),transparent);border-radius:8px 8px 0 0}body.light .card{box-shadow:0 1px 4px rgba(0,0,0,0.08)}body.light .irow{background:rgba(255,255,255,0.5);border-color:var(--border)}
.lbl{color:var(--td);font-family:var(--ft);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;display:block}
.row{display:flex;align-items:center;gap:6px}
.page{padding:12px;display:flex;flex-direction:column;gap:10px}
#hdr{background:linear-gradient(180deg,var(--paper) 0%,rgba(26,22,16,0.97) 100%);border-bottom:1px solid var(--border);padding:8px 12px;position:sticky;top:0;z-index:100}
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(26,22,16,0.95);backdrop-filter:blur(8px);border-top:1px solid var(--border);z-index:100;overflow-x:auto;-webkit-overflow-scrolling:touch}
#nav-inner{display:flex;min-width:max-content;padding:4px 8px;gap:2px}
.nb{background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 10px;border-radius:6px;flex-shrink:0}
.nb.on{background:rgba(201,168,76,0.15)}
.nb .ic{font-size:18px}
.nb .tx{font-size:8px;font-family:var(--ft);letter-spacing:.5px;white-space:nowrap;color:var(--tk)}
.nb.on .tx{color:var(--gl)}
#content{padding-bottom:80px;max-width:600px;margin:0 auto}
.sl{position:fixed;top:0;left:0;width:3px;height:100vh;background:linear-gradient(180deg,transparent,var(--gd),transparent);pointer-events:none;z-index:50}
.sr{position:fixed;top:0;right:0;width:3px;height:100vh;background:linear-gradient(180deg,transparent,var(--gd),transparent);pointer-events:none;z-index:50}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;width:420px;max-width:95vw;max-height:88vh;overflow-y:auto;position:relative}
.mbox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gd),transparent);border-radius:8px 8px 0 0}
.mpur{border-color:var(--purl)}
.mpur::before{background:linear-gradient(90deg,transparent,var(--purl),transparent)}
.rpop{position:fixed;bottom:80px;right:12px;background:var(--card);border:1px solid var(--gold);border-radius:8px;padding:8px 12px;z-index:999;text-align:center;min-width:110px;display:none}
.irow{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;padding:6px}
.srow{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid rgba(90,62,27,.15)}
.mgrow{display:flex;align-items:center;gap:4px;padding:4px 0;border-bottom:1px solid rgba(90,62,27,.15)}
.chkb{width:14px;height:14px;border:1px solid var(--border);border-radius:2px;background:rgba(0,0,0,.4);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:10px;color:var(--gold)}
.chkb.on{border-color:var(--gold);background:rgba(201,168,76,.3)}
.dotc{width:13px;height:13px;border:2px solid var(--border);border-radius:50%;background:transparent;cursor:pointer;flex-shrink:0;display:inline-block}
.dotc.on{border-color:var(--gold);background:rgba(201,168,76,.6)}
.cbA{background:rgba(42,107,58,.3);border:1px solid var(--green);color:var(--greenl);border-radius:3px;padding:0 4px;font-size:10px;font-family:monospace}
.cbAB{background:rgba(26,58,107,.3);border:1px solid var(--blue);color:var(--bluel);border-radius:3px;padding:0 4px;font-size:10px;font-family:monospace}
.cbR{background:rgba(139,32,32,.3);border:1px solid var(--red);color:var(--rl);border-radius:3px;padding:0 4px;font-size:10px;font-family:monospace}
.slotc{width:14px;height:14px;border-radius:50%;border:2px solid var(--gold);background:rgba(201,168,76,.6);cursor:pointer;display:inline-block}
.slotc.used{background:rgba(201,168,76,.15)}
.dc{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid var(--green);display:inline-block}
.dc.f{border-color:var(--red)}
.dc.on{background:var(--green)}
.dc.f.on{background:var(--red)}
.ic2{width:20px;height:20px;border-radius:50%;border:2px solid var(--gold);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:var(--gold)}
.ic2.on{background:rgba(201,168,76,.5)}
.pb{height:5px;background:rgba(0,0,0,.4);border-radius:3px;margin-top:4px;overflow:hidden}
.pbf{height:100%;background:linear-gradient(90deg,var(--gold),var(--gl))}
</style>
  <style>
        /* Definizione colori per i temi */
        :root { --footer-text: rgba(0, 0, 0, 0.6); }
        [data-theme="dark"] { --footer-text: rgba(255, 255, 255, 0.6); }

        .footer-noemi {
            text-align: center;
            padding: 40px 10px;
            font-family: sans-serif;
            font-size: 0.85em;
            color: var(--footer-text);
            animation: apparizione 1.5s ease-out;
            transition: color 0.3s ease;
        }

        .link-noemi {
            color: inherit;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid currentColor;
        }

        @keyframes apparizione {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="sl"></div><div class="sr"></div>
<div id="hdr">
  <div class="row" style="justify-content:space-between">
    <div>
      <div id="hn" style="color:var(--gl);font-family:var(--ft);font-size:15px;line-height:1.2">Nuovo Personaggio</div>
      <div id="hs" style="color:var(--td);font-size:11px"></div>
    </div>
    <div class="row" style="gap:4px;align-items:center;flex-wrap:wrap">
      <span id="sync-status" style="font-size:10px;display:none"></span>
      <button class="sm ghost" id="theme-btn" onclick="toggleTheme()">☀</button>
      <button class="sm ghost" onclick="doExport()">⬇ Export</button>
      <button class="sm ghost" onclick="document.getElementById('ifile').click()">⬆ Import</button>
      <input id="ifile" type="file" accept=".json" style="display:none;width:auto" onchange="doImport(event)"/>
      <!-- Mostrato se NON loggato -->
      <button class="sm gold" id="login-btn" onclick="sbSignIn()">☁ Login</button>
      <!-- Mostrato se LOGGATO (nascosto di default) -->
      <div id="user-info" style="display:none;align-items:center;gap:4px" class="row">
        <button class="sm gold" onclick="sbSwitchScheda()">⚔ Schede</button>
        <span id="user-name" style="font-size:10px;color:var(--td);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        <button class="sm ghost" onclick="sbSignOut()" style="font-size:10px;color:var(--td)">Esci</button>
      </div>
    </div>
  </div>
  <div id="hp" style="color:var(--gold);font-family:var(--ft);font-size:10px;letter-spacing:2px;text-align:center;margin-top:2px"></div>
</div>
<div id="content"></div>
<div id="nav"><div id="nav-inner"></div></div>
<div id="modal-root"></div>
<div id="rpop" class="rpop"></div>

<script>
// ══ DATA ══
const PAGES=[
  {id:'main',ic:'📜',tx:'Principale'},{id:'skills',ic:'🎯',tx:'Abilità'},
  {id:'combat',ic:'⚔',tx:'Combattimento'},{id:'spells',ic:'✨',tx:'Incantesimi'},
  {id:'combo',ic:'⚡',tx:'Combo'},{id:'inventory',ic:'🎒',tx:'Inventario'},{id:'personality',ic:'🎭',tx:'Personalità'},
  {id:'diario',ic:'📓',tx:'Diario'},{id:'world',ic:'🗺',tx:'Mondo'},{id:'homebrew',ic:'⚗',tx:'Homebrew'},
  {id:'settings',ic:'⚙',tx:'Impostazioni'},
];

// ── SPELL DATABASES (SRD 2014 & 2024) ──
const SRD14={"aiuto":{"it":"Aiuto","lv":2,"sc":"Abiurazione","ca":"A","ra":"9 metri","du":"8 ore","co":"V,S,M (una minuscola striscia di stoffa bianca)","de":"L'incantesimo infonde vigore e determinazione negli alleati dell'incantatore. Sceglie fino a tre creature entro gittata. Il punteggio massimo dei punti ferita e i punti ferita attuali di ogni bersaglio aumentano di 5 per la durata.\n\nA livelli superiori: I punti ferita del bersaglio aumentano di altri 5 per ogni livello dello slot superiore al 2°.","rituale":false},"allarme":{"it":"Allarme","lv":1,"sc":"Abiurazione","ca":"special","ra":"9 metri","du":"8 ore","co":"V,S,M (un minuscolo campanello e un sottile filo d'argento)","de":"L'incantatore predispone un allarme per rilevare le intrusioni. Sceglie una porta, una finestra o un'area entro gittata che non superi un cubo di 6 metri di spigolo. Fino al termine dell'incantesimo, l'allarme avvisa l'incantatore ogni volta che una creatura di taglia Minuscola o superiore entra nell'area o la tocca.","rituale":true},"allucinazione mortale":{"it":"Allucinazione Mortale","lv":4,"sc":"Illusione","ca":"A","ra":"18 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S","de":"L'incantatore attinge alle paure di una creatura che egli è in grado di vedere entro gittata e crea un'illusione che solo quel bersaglio può vedere. Il bersaglio deve effettuare un TS su Saggezza. Se lo fallisce, diventa spaventato per la durata. All'inizio di ogni turno del bersaglio, questi deve superare un TS su Saggezza o subire 4d10 danni psichici.\n\nA livelli superiori: Il danno aumenta di 1d10 per ogni livello dello slot superiore al 4°.","rituale":false},"alterare sé stesso":{"it":"Alterare Sé Stesso","lv":2,"sc":"Trasmutazione","ca":"A","ra":"Personale","du":"Concentrazione, fino a 1 ora","co":"V,S","de":"L'incantatore assume una forma diversa. Sceglie una tra le seguenti opzioni: Adattamento Acquatico, Cambiare Aspetto o Armi Naturali. Può cambiare l'opzione scelta usando un'azione.","rituale":false},"amicizia":{"it":"Amicizia","lv":0,"sc":"Ammaliamento","ca":"A","ra":"Personale","du":"Concentrazione, fino a 1 minuto","co":"S,M (una piccola quantità di trucco applicata al volto durante il lancio)","de":"Per la durata, l'incantatore dispone di vantaggio a tutte le prove di Carisma dirette a una creatura a sua scelta che non sia ostile nei suoi confronti. Quando l'incantesimo termina, la creatura si rende conto di essere stata influenzata dalla magia e diventa ostile nei confronti dell'incantatore.","rituale":false},"andatura spedita":{"it":"Andatura Spedita","lv":1,"sc":"Trasmutazione","ca":"A","ra":"Contatto","du":"1 ora","co":"V,S,M (un pizzico di polvere)","de":"L'incantatore tocca una creatura. La velocità sul terreno del bersaglio aumenta di 3 metri fino al termine dell'incantesimo.\n\nA livelli superiori: L'incantatore può colpire una creatura aggiuntiva per ogni livello dello slot superiore al 1°.","rituale":false},"animare morti":{"it":"Animare Morti","lv":3,"sc":"Necromanzia","ca":"special","ra":"3 metri","du":"Istantanea","co":"V,S,M (una goccia di sangue, un pezzo di carne e un pizzico di polvere di ossa)","de":"L'incantatore crea un servitore non morto. Sceglie un mucchio di ossa o il cadavere di un umanoide entro gittata. L'incantesimo infonde nel bersaglio un'imitazione corrotta della vita, facendolo risorgere come uno scheletro (se ossa) o uno zombi (se cadavere).\n\nA livelli superiori: L'incantatore può animare o riaffermare il controllo su due creature non morte aggiuntive per ogni livello dello slot superiore al 3°.","rituale":false},"animare oggetti":{"it":"Animare Oggetti","lv":5,"sc":"Trasmutazione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S","de":"Gli oggetti prendono vita al comando dell'incantatore. Sceglie fino a dieci oggetti non magici entro gittata che non siano indossati o trasportati. Gli oggetti diventano creature sotto il controllo dell'incantatore.\n\nA livelli superiori: L'incantatore può animare due oggetti aggiuntivi per ogni livello dello slot superiore al 5°.","rituale":false},"anti-individuazione":{"it":"Anti-individuazione","lv":3,"sc":"Abiurazione","ca":"A","ra":"Contatto","du":"8 ore","co":"V,S,M (un pizzico di polvere di diamante del valore di almeno 25 mo spruzzata sul bersaglio)","de":"Per la durata, l'incantatore nasconde una creatura o un oggetto che tocca alle magie di divinazione. Il bersaglio non può essere bersagliato da alcuna magia di divinazione o percepito tramite sensori magici di scrutamento.","rituale":false},"apertura":{"it":"Apertura","lv":2,"sc":"Trasmutazione","ca":"A","ra":"18 metri","du":"Istantanea","co":"V","de":"L'incantatore sceglie un oggetto entro gittata. L'oggetto può essere una porta, una scatola, un baule, un paio di manette, un lucchetto o un altro oggetto che contenga un meccanismo mondano o magico che ne impedisca l'apertura. Se l'oggetto è chiuso da un meccanismo mondano, questo si sblocca o si apre. Se l'oggetto ha il lucchetto magico, tale incantesimo è soppresso per 10 minuti.","rituale":false},"arma magica":{"it":"Arma Magica","lv":2,"sc":"Trasmutazione","ca":"AB","ra":"Contatto","du":"Concentrazione, fino a 1 ora","co":"V,S","de":"L'incantatore tocca un'arma non magica. Finché l'incantesimo non termina, quell'arma diventa un'arma magica con un bonus di +1 ai tiri per colpire e ai tiri per il danno.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 4° livello o superiore, il bonus aumenta a +2. Quando usa uno slot incantesimo di 6° livello o superiore, il bonus aumenta a +3.","rituale":false},"arma spirituale":{"it":"Arma Spirituale","lv":2,"sc":"Invocazione","ca":"AB","ra":"18 metri","du":"1 minuto","co":"V,S","de":"L'incantatore crea un'arma spettrale e fluttuante entro la gittata, che permane per la durata dell'incantesimo o finché l'incantatore non lancia di nuovo questo incantesimo. Quando l'incantatore lancia l'incantesimo, può effettuare un attacco incantesimo in mischia contro una creatura situata entro 1,5 metri dall'arma. Se colpisce, il bersaglio subisce danni da forza pari a 1d8 + il modificatore della caratteristica da incantatore dell'incantatore. Come azione bonus nel proprio turno, l'incantatore può muovere l'arma di un massimo di 6 metri e ripetere l'attacco contro una creatura situata entro 1,5 metri da essa.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 3° livello o superiore, i danni aumentano di 1d8 per ogni due livelli dello slot sopra il 2°.","rituale":false},"armatura di mago":{"it":"Armatura di Mago","lv":1,"sc":"Abiurazione","ca":"A","ra":"Contatto","du":"8 ore","co":"V,S,M (un pezzetto di cuoio conciato)","de":"L'incantatore tocca una creatura consenziente che non indossa un'armatura e una forza magica protettiva la avvolge fino al termine dell'incantesimo. La CA base del bersaglio diventa 13 + il suo modificatore di Destrezza. L'incantesimo termina se il bersaglio indossa un'armatura o se l'incantatore interrompe l'incantesimo con un'azione.","rituale":false},"attutire caduta":{"it":"Attutire Caduta","lv":1,"sc":"Trasmutazione","ca":"R","ra":"18 metri","du":"1 minuto","co":"M (una piccola piuma o un po' di piumino)","de":"L'incantatore sceglie fino a cinque creature che cadono entro la gittata. La velocità di caduta di ogni creatura scende a 18 metri per round fino al termine dell'incantesimo. Se la creatura atterra prima che l'incantesimo termini, non subisce danni dalla caduta e atterra in piedi; l'incantesimo poi termina per quella creatura.","rituale":false},"augurio":{"it":"Augurio","lv":2,"sc":"Divinazione","ca":"special","ra":"Personale","du":"Istantanea","co":"V,S,M (bastoncini, ossi o carte simili contrassegnati in modo speciale del valore di almeno 25 mo)","de":"Lanciando bastoncini tempestati di gemme, tirando ossi di drago, estraendo carte ornate o usando qualche altro strumento di divinazione, l'incantatore riceve un presagio da un'entità ultraterrena in merito ai risultati di uno specifico corso d'azione che intende intraprendere entro i prossimi 30 minuti. Il GM sceglie tra i seguenti possibili presagi: Bene, Male, Bene e Male, Nessun risultato.","rituale":true},"aura di purezza":{"it":"Aura di Purezza","lv":4,"sc":"Abiurazione","ca":"A","ra":"Personale (raggio di 9 metri)","du":"Concentrazione, fino a 10 minuti","co":"V","de":"Un'energia purificatrice si irradia dall'incantatore in un raggio di 9 metri. Finché l'incantesimo non termina, l'aura si muove assieme all'incantatore ed è centrata su di lui. Ogni creatura non ostile nell'aura (incluso l'incantatore) non può contrarre malattie, ha resistenza ai danni da veleno e dispone di vantaggio ai tiri salvezza contro gli effetti che rendono le creature accecate, assordate, affascinate, spaventate, paralizzate, avvelenate o stordite.","rituale":false},"aura di vitalità":{"it":"Aura di Vitalità","lv":3,"sc":"Evocazione","ca":"A","ra":"Personale (raggio di 9 metri)","du":"Concentrazione, fino a 1 minuto","co":"V","de":"Un'energia curativa si irradia dall'incantatore in un raggio di 9 metri. Finché l'incantesimo non termina, l'aura si muove assieme all'incantatore ed è centrata su di lui. Come azione bonus, l'incantatore può scegliere una creatura nell'aura (incluso se stesso) e farle recuperare 2d6 punti ferita.","rituale":false},"aura santa":{"it":"Aura Santa","lv":8,"sc":"Abiurazione","ca":"A","ra":"Personale","du":"Concentrazione, fino a 1 minuto","co":"V,S,M (un minuscolo reliquiario del valore di almeno 1.000 mo contenente una reliquia sacra)","de":"Una luce divina si sprigiona dall'incantatore e si condensa in una morbida luminosità in un raggio di 9 metri attorno a lui. Le creature a scelta dell'incantatore situate entro quel raggio emettono luce fioca in un raggio di 1,5 metri e dispongono di vantaggio a tutti i tiri salvezza; inoltre, le altre creature dispongono di svantaggio ai tiri per colpire effettuati contro di esse finché l'incantesimo non termina. In aggiunta, quando un immondo o un non morto colpisce una creatura influenzata con un attacco in mischia, l'aura brilla con una luce intensa. L'attaccante deve superare un tiro salvezza su Costituzione o rimanere accecato finché l'incantesimo non termina.","rituale":false},"avvisaglia":{"it":"Avvisaglia","lv":0,"sc":"Divinazione","ca":"A","ra":"Contatto","du":"Fino alla fine del turno successivo dell'incantatore","co":"V,S","de":"L'incantatore tende la mano e traccia un segno di sventura nell'aria in direzione di un bersaglio situato entro la gittata. Il bersaglio ottiene vantaggio al primo tiro per colpire effettuato contro di esso, a condizione che tale tiro venga effettuato prima della fine del turno successivo dell'incantatore.","rituale":false},"bacche buone":{"it":"Bacche Buone","lv":1,"sc":"Trasmutazione","ca":"A","ra":"Contatto","du":"Istantanea","co":"V,S,M (un rametto di vischio)","de":"Nella mano dell'incantatore compaiono fino a dieci bacche infuse di magia per la durata dell'incantesimo. Una creatura può usare la propria azione per mangiare una bacca. Mangiare una bacca ripristina 1 punto ferita e fornisce nutrimento sufficiente per un giorno. Le bacche perdono la loro efficacia se non vengono consumate entro 24 ore dal lancio dell'incantesimo.","rituale":false},"bagliore lunare":{"it":"Bagliore Lunare","lv":2,"sc":"Invocazione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S,M (alcuni semi a mezzaluna di un qualsiasi vitigno legnoso e un frammento di feldspato opalescente)","de":"Un bagliore argentato di luce pallida forma un cilindro del raggio di 1,5 metri e dell'altezza di 12 metri centrato su un punto entro gittata. Fino al termine dell'incantesimo, il cilindro è pervaso da luce fioca. Quando una creatura entra nell'area dell'incantesimo per la prima volta in un turno o inizia il suo turno qui, è avvolta da fiamme spettrali che le causano dolori lancinanti e deve effettuare un tiro salvezza su Costituzione. In caso di fallimento, subisce 2d10 danni radiosi, o la metà dei danni in caso di successo. Un mutaforma subisce svantaggio a questo tiro salvezza e, se lo fallisce, riassume immediatamente la sua forma originale e non può assumerne una diversa finché non esce dalla luce dell'incantesimo. Nei suoi turni successivi, dopo aver lanciato questo incantesimo, l'incantatore può usare un'azione per muovere il bagliore per 18 metri in ogni direzione.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 3° livello o superiore, i danni aumentano di 1d10 per ogni slot di livello superiore al 2°.","rituale":false},"bagliore solare":{"it":"Bagliore Solare","lv":6,"sc":"Invocazione","ca":"A","ra":"Incantatore (linea di 18 metri)","du":"Concentrazione, fino a 1 minuto","co":"V,S,M (una lente d'ingrandimento)","de":"Un raggio di luce brillante si sprigiona dalla mano dell'incantatore in una linea lunga 18 metri e larga 1,5 metri. Ogni creatura entro la linea deve effettuare un tiro salvezza su Costituzione. Se lo fallisce, subisce 6d8 danni radiosi e rimane accecata fino al turno successivo dell'incantatore. In caso di successo, subisce invece solo la metà dei danni e non viene accecata dall'incantesimo. Non morti e melme subiscono svantaggio a questo tiro salvezza. Con un'azione, l'incantatore può creare una nuova linea di luce in qualsiasi turno fino al termine dell'incantesimo. Per la sua durata, una scintilla di luce radiosa risplende nella mano dell'incantatore ed emana luce intensa in un raggio di 9 metri e luce fioca per ulteriori 9 metri. Questa luce è considerata luce solare.","rituale":false},"banchetto degli eroi":{"it":"Banchetto degli Eroi","lv":6,"sc":"Evocazione","ca":"A","ra":"9 metri","du":"Istantanea","co":"V,S,M (una ciotola tempestata di gemme del valore di almeno 1.000 mo, che l'incantesimo consuma)","de":"L'incantatore evoca un ricco banchetto, completo di sontuose pietanze e bevande. Consumare il banchetto richiede 1 ora, solo al termine della quale il convivio scompare e i suoi effetti benefici vengono applicati. Fino a un massimo di dodici creature possono partecipare al banchetto. Una creatura che partecipa al banchetto ne trae diversi benefici: viene curata da tutti i tipi di malattie e veleni, diventa immune ai veleni e alla condizione spaventato e dispone di vantaggio a tutti i tiri salvezza su Saggezza. Inoltre, i suoi punti ferita massimi aumentano di 2d10 e recupera la stessa quantità di punti ferita. Questi benefici permangono per 24 ore.","rituale":false},"barriera di lame":{"it":"Barriera di Lame","lv":6,"sc":"Evocazione","ca":"A","ra":"27 metri","du":"Concentrazione, fino a 10 minuti","co":"V,S","de":"L'incantatore crea una parete verticale di lame rotanti, affilate come rasoi e composte di energia magica. La barriera appare entro la gittata e permane per la durata dell'incantesimo. L'incantatore può creare una parete rettilinea lunga fino a 30 metri, alta 6 metri e spessa 1,5 metri, oppure una parete circolare con un diametro fino a 18 metri, alta 6 metri e spessa 1,5 metri. La barriera fornisce copertura base a chiunque si trovi dietro di essa e lo spazio che occupa è terreno difficile. Quando una creatura entra nell'area della barriera per la prima volta in un turno o vi inizia il turno, deve effettuare un tiro salvezza su Destrezza. Se lo fallisce, subisce 10d10 danni taglienti, mentre se lo supera, subisce la metà di quei danni.","rituale":false},"beffa crudele":{"it":"Beffa Crudele","lv":0,"sc":"Ammaliamento","ca":"A","ra":"18 metri","du":"Istantanea","co":"V","de":"L'incantatore scaglia una serie di insulti infarciti di sottili incantesimi contro una creatura situata entro gittata e che egli sia in grado di vedere. Se il bersaglio è in grado di sentire l'incantatore (ma non è necessario che lo capisca), deve superare un tiro salvezza su Saggezza, altrimenti subirà 1d4 danni psichici e avrà svantaggio al prossimo tiro per colpire che effettuerà prima della fine del suo turno successivo.\n\nA livelli superiori: I danni di questo incantesimo aumentano di 1d4 quando l'incantatore raggiunge il 5° livello (2d4), l'11° livello (3d4) e il 17° livello (4d4).","rituale":false},"blocca animali":{"it":"Blocca Animali","lv":2,"sc":"Ammaliamento","ca":"A","ra":"18 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S,M (un piccolo pezzo di ferro dritto)","de":"L'incantatore sceglie una bestia situata entro gittata e che egli sia in grado di vedere. Il bersaglio deve superare un tiro salvezza su Saggezza, altrimenti rimarrà paralizzato per la durata dell'incantesimo. Alla fine di ogni suo turno, il bersaglio può effettuare un altro tiro salvezza su Saggezza: se lo supera, l'incantesimo termina.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 3° livello o superiore, può bersagliare una bestia aggiuntiva per ogni slot di livello superiore al 2°. Le bestie devono trovarsi entro 9 metri l'una dall'altra quando l'incantatore le bersaglia.","rituale":false},"blocca mostri":{"it":"Blocca Mostri","lv":5,"sc":"Ammaliamento","ca":"A","ra":"27 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S,M (un piccolo pezzo di ferro dritto)","de":"L'incantatore sceglie una creatura situata entro gittata e che egli sia in grado di vedere. Il bersaglio deve superare un tiro salvezza su Saggezza, altrimenti rimarrà paralizzato per la durata dell'incantesimo. Questo incantesimo non ha effetto sui non morti. Alla fine di ogni suo turno, il bersaglio può effettuare un altro tiro salvezza su Saggezza: se lo supera, l'incantesimo termina.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 6° livello o superiore, può bersagliare una creatura aggiuntiva per ogni slot di livello superiore al 5°. Le creature devono trovarsi entro 9 metri l'una dall'altra quando l'incantatore le bersaglia.","rituale":false},"blocca persone":{"it":"Blocca Persone","lv":2,"sc":"Ammaliamento","ca":"A","ra":"18 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S,M (un piccolo pezzo di ferro dritto)","de":"L'incantatore sceglie un umanoide situata entro gittata e che egli sia in grado di vedere. Il bersaglio deve superare un tiro salvezza su Saggezza, altrimenti rimarrà paralizzato per la durata dell'incantesimo. Alla fine di ogni suo turno, il bersaglio può effettuare un altro tiro salvezza su Saggezza: se lo supera, l'incantesimo termina.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 3° livello o superiore, può bersagliare un umanoide aggiuntivo per ogni slot di livello superiore al 2°. Gli umanoidi devono trovarsi entro 9 metri l'uno dall'altro quando l'incantatore li bersaglia.","rituale":false},"catena di fulmini":{"it":"Catena di Fulmini","lv":6,"sc":"Invocazione","ca":"A","ra":"45 metri","du":"Istantanea","co":"V,S,M (un ciuffo di pelliccia; un frammento d'amber, di vetro o di una verga di cristallo e tre spilli d'argento)","de":"L'incantatore crea un fulmine scagliandolo verso un bersaglio di sua scelta entro gittata e che è in grado di vedere. Tre fulmini sfrecciano poi dal bersaglio verso un massimo di altri tre bersagli, ognuno dei quali deve trovarsi entro 9 metri dal primo. I bersagli dell'incantesimo possono essere creature o oggetti, che possono essere bersagliati soltanto da uno dei fulmini. Un bersaglio deve effettuare un tiro salvezza su Destrezza, subendo 10d8 danni da fulmine in caso di fallimento, o la metà dei danni in caso di successo.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 7° livello o superiore, un fulmine aggiuntivo per ogni slot di livello superiore al 6° sfreccia dal primo bersaglio colpendone un altro.","rituale":false},"cecità/sordità":{"it":"Cecità/Sordità","lv":2,"sc":"Necromanzia","ca":"A","ra":"9 metri","du":"1 minuto","co":"V","de":"L'incantatore può accecare o assordare un avversario. Sceglie una creatura entro gittata che egli sia in grado di vedere, la quale deve effettuare un tiro salvezza su Costituzione. Se lo fallisce, la creatura è accecata o assordata (a scelta dell'incantatore) per la durata dell'incantesimo. Alla fine di ogni suo turno, il bersaglio può effettuare un tiro salvezza su Costituzione: se lo supera, l'incantesimo termina.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 3° livello o superiore, può bersagliare una creatura aggiuntiva per ogni slot di livello superiore al 2°.","rituale":false},"cerchio di morte":{"it":"Cerchio di Morte","lv":6,"sc":"Necromanzia","ca":"A","ra":"45 metri","du":"Istantanea","co":"V,S,M (una perla nera polverizzata del valore di almeno 500 mo)","de":"Una sfera di energia negativa si propaga in un raggio di 18 metri a partire da un punto scelto dall'incantatore entro gittata. Ogni creatura in quell'area deve effettuare un tiro salvezza su Costituzione. Se lo fallisce, subisce 8d6 danni necrotici, mentre se lo supera subisce la metà di quei danni.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 7° livello o superiore, i danni aumentano di 2d6 per ogni slot di livello superiore al 6°.","rituale":false},"cerchio di potere":{"it":"Cerchio di Potere","lv":5,"sc":"Abiurazione","ca":"A","ra":"Personale (raggio di 9 metri)","du":"Concentrazione, fino a 10 minuti","co":"V","de":"Un'energia divina si irradia dall'incantatore, proteggendo lui e i suoi alleati dagli effetti magici. Finché l'incantesimo non termina, l'aura si muove assieme all'incantatore ed è centrata su di lui. Ogni creatura amica nell'aura (incluso l'incantatore) dispone di vantaggio ai tiri salvezza contro gli incantesimi e altri effetti magici. Inoltre, se una creatura amica nell'aura supera un tiro salvezza contro un incantesimo o un effetto magico che le permette di subire solo la metà dei danni in caso di successo, non subisce alcun danno.","rituale":false},"chiaroveggenza":{"it":"Chiaroveggenza","lv":3,"sc":"Divinazione","ca":"A","ra":"1,5 km","du":"Concentrazione, fino a 10 minuti","co":"V,S,M (un focus del valore di almeno 100 mo (un corno di vetro per l'udito o un occhio di vetro per la vista))","de":"L'incantatore crea un sensore invisibile in un luogo familiare o in un luogo particolare a lui ignoto che egli scelga entro la gittata. Il sensore permane in quel luogo per la durata dell'incantesimo e non può essere spostato. Quando lancia l'incantesimo, l'incantatore sceglie se vedere o sentire attraverso il sensore e può usare un'azione per passare da un senso all'altro.","rituale":false},"colpo infuocato":{"it":"Colpo Infuocato","lv":5,"sc":"Invocazione","ca":"A","ra":"18 metri","du":"Istantanea","co":"V,S,M (un pizzico di zolfo)","de":"Una colonna verticale di fuoco divino si abbatte dai cieli in un luogo indicato dall'incantatore. Ogni creatura all'interno di un cilindro del raggio di 3 metri e dell'altezza di 12 metri centrato in un punto entro gittata deve effettuare un tiro salvezza su Destrezza. In caso di fallimento, la creatura subisce 4d6 danni da fuoco e 4d6 danni radiosi, o la metà dei danni in caso di successo.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 6° livello o superiore, i danni (sia da fuoco che radiosi) aumentano di 1d6 per ogni slot di livello superiore al 5°.","rituale":false},"comunione":{"it":"Comunione","lv":5,"sc":"Divinazione","ca":"special","ra":"Personale","du":"1 minuto","co":"V,S,M (incenso e una fiala di acqua santa o sacrilega)","de":"L'incantatore entra in contatto con la sua divinità o un emissario divino e pone fino a tre domande a cui è possibile rispondere con 'sì' o 'no'. L'incantatore riceve una risposta corretta per ogni domanda. Se l'incantatore lancia l'incantesimo due o più volte prima di completare un riposo lungo, esiste una probabilità cumulativa del 25% di non ottenere risposta per ogni lancio dopo il primo.","rituale":true},"dardo incantato":{"it":"Dardo Incantato","lv":1,"sc":"Invocazione","ca":"A","ra":"36 metri","du":"Istantanea","co":"V,S","de":"L'incantatore crea tre darti lucenti di forza magica. Ogni dardo colpisce una creatura a scelta dell'incantatore situata entro gittata e che egli sia in grado di vedere. Un dardo infligge 1d4 + 1 danni da forza. I dardi colpiscono tutti simultaneamente e l'incantatore può dirigerli contro una sola creatura o più creature.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 2° livello o superiore, l'incantesimo crea un dardo aggiuntivo per ogni slot di livello superiore al 1°.","rituale":false},"dardo tracciante":{"it":"Dardo Tracciante","lv":1,"sc":"Invocazione","ca":"A","ra":"36 metri","du":"1 round","co":"V,S","de":"L'incantatore effettua un attacco incantesimo a distanza contro una creatura situata entro gittata. Se colpisce, il bersaglio subisce 4d6 danni radiosi e il prossimo tiro per colpire effettuato contro questo bersaglio prima della fine del turno successivo dell'incantatore dispone di vantaggio, grazie alla mistica luce fioca che brilla sul bersaglio.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 2° livello o superiore, i danni aumentano di 1d6 per ogni slot di livello superiore al 1°.","rituale":false},"dissolvi magie":{"it":"Dissolvi Magie","lv":3,"sc":"Abiurazione","ca":"A","ra":"36 metri","du":"Istantanea","co":"V,S","de":"L'incantatore sceglie una creatura, un oggetto o un effetto magico entro gittata. Ogni incantesimo di 3° livello o inferiore sul bersaglio termina. Per ogni incantesimo di 4° livello o superiore sul bersaglio, l'incantatore effettua una prova di caratteristica usando la sua caratteristica da incantatore (CD 10 + livello dell'incantesimo). Se la supera, l'incantesimo termina.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 4° livello o superiore, termina automaticamente gli effetti di un incantesimo sul bersaglio se il livello di quell'incantesimo è pari o inferiore al livello dello slot usato.","rituale":false},"dardo di fuoco":{"it":"Dardo di Fuoco","lv":0,"sc":"Invocazione","ca":"A","ra":"36 metri","du":"Istantanea","co":"V,S","de":"L'incantatore scaglia una scintilla di fuoco verso una creatura o un oggetto situato entro gittata, effettuando un attacco a distanza con incantesimo contro il bersaglio. Se il colpo va a segno, il bersaglio subisce 1d10 danni da fuoco. Un oggetto infiammabile colpito da questo incantesimo prende fuoco se non indossato o trasportato in quel momento.\n\nA livelli superiori: I danni dell'incantesimo aumentano di 1d10 quando l'incantatore raggiunge il 5° livello (2d10), l'11° livello (3d10) e il 17° livello (4d10).","rituale":false},"dito della morte":{"it":"Dito della Morte","lv":7,"sc":"Necromanzia","ca":"A","ra":"18 metri","du":"Istantanea","co":"V,S","de":"L'incantatore trasmette un flusso di energia negativa a una creatura entro gittata che è in grado di vedere, causandole dolori lancinanti. Il bersaglio deve effettuare un tiro salvezza su Costituzione e subisce 7d8 + 30 danni necrotici in caso di fallimento, o la metà dei danni in caso di successo. Se questo danno riduce il bersaglio a 0 punti ferita, esso muore e si rianima all'inizio del turno successivo dell'incantatore come uno zombi sotto il suo comando permanente.","rituale":false},"divinazione":{"it":"Divinazione","lv":4,"sc":"Divinazione","ca":"A","ra":"Personale","du":"Istantanea","co":"V,S,M (incenso e un'offerta sacrificale appropriata alla religione dell'incantatore, del valore di almeno 25 mo, che l'incantesimo consuma)","de":"L'incantatore pone una domanda riguardante uno specifico obiettivo, evento o attività che avverrà entro i prossimi 7 giorni. Il GM fornisce una risposta veritiera, che potrebbe essere una frase breve, un rima criptica o un presagio. L'incantesimo non tiene conto di possibili circostanze che potrebbero cambiare l'esito. Se l'incantatore lancia l'incantesimo due o più volte prima di completare un riposo lungo, esiste una probabilità cumulativa del 25% di ottenere una risposta casuale.","rituale":true},"dominare persone":{"it":"Dominare Persone","lv":5,"sc":"Ammaliamento","ca":"A","ra":"18 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S","de":"L'incantatore tenta di soggiogare un umanoide entro gittata che è in grado di vedere e che deve superare un tiro salvezza su Saggezza (con vantaggio se l'incantatore lo sta combattendo), altrimenti rimarrà affascinato per la durata dell'incantesimo. Finché è affascinato, l'incantatore ha un legame telepatico con lui e può impartire ordini (nessun'azione richiesta). Il bersaglio esegue al meglio delle sue capacità. Ogni volta che subisce danni, effettua un nuovo tiro salvezza.\n\nA livelli superiori: L'uso di slot di livello superiore aumenta la durata della concentrazione: 6° livello (10 minuti), 7° livello (1 ora), 8° livello o superiore (8 ore).","rituale":false},"esplosione solare":{"it":"Esplosione Solare","lv":8,"sc":"Invocazione","ca":"A","ra":"45 metri","du":"Istantanea","co":"V,S,M (fuoco e un frammento di pietra del sole)","de":"Una radiosa luce solare splende in un raggio di 18 metri, centrato su un punto entro gittata. Ogni creatura toccata deve effettuare un tiro salvezza su Costituzione. Se lo fallisce, subisce 12d6 danni radiosi e rimane accecata per 1 minuto. In caso di successo, subisce metà danni e non viene accecata. Non morti e melme hanno svantaggio al tiro. Questo incantesimo dissolve l'oscurità magica nell'area.","rituale":false},"estasiare":{"it":"Estasiare","lv":2,"sc":"Ammaliamento","ca":"A","ra":"18 metri","du":"1 minuto","co":"V","de":"L'incantatore pronuncia una sequenza di parole disorientante. Le creature scelte entro gittata che possono sentirlo devono superare un tiro salvezza su Saggezza. Chi fallisce ha svantaggio alle prove di Saggezza (Percezione) per notare chiunque tranne l'incantatore. L'effetto termina se l'incantatore è incapacitato o smette di parlare.","rituale":false},"fabbricare":{"it":"Fabbricare","lv":4,"sc":"Trasmutazione","ca":"A","ra":"36 metri","du":"Istantanea","co":"V,S","de":"L'incantatore trasforma materie prime in un oggetto finito. Può creare un oggetto di taglia Grande o inferiore (Media se di metallo o pietra). La qualità dipende dai materiali. Non può creare oggetti magici o creature. Per oggetti complessi (armi, armature, gioielli), l'incantatore deve avere competenza negli strumenti da artigiano relativi.","rituale":false},"faro di speranza":{"it":"Faro di Speranza","lv":3,"sc":"Abiurazione","ca":"A","ra":"9 metri","du":"Concentrazione, fino a 1 minuto","co":"V","de":"L'incantatore sceglie un qualsiasi numero di creature entro gittata. Per la durata, ogni bersaglio dispone di vantaggio ai tiri salvezza su Saggezza, ai tiri salvezza contro morte e recupera il numero massimo di punti ferita possibile da qualsiasi guarigione.","rituale":false},"fatale":{"it":"Fatale","lv":9,"sc":"Illusione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 1 minuto","co":"V","de":"Attingendo alle paure più profonde di un gruppo di creature in una sfera di 9 metri di raggio, l'incantatore crea nelle loro menti creature illusorie. Ogni bersaglio deve superare un tiro salvezza su Saggezza o rimanere spaventato. Al termine di ogni suo turno, la creatura spaventata deve superare un tiro salvezza su Saggezza o subire 4d10 danni psichici.","rituale":false},"forma eterea":{"it":"Forma Eterea","lv":7,"sc":"Trasmutazione","ca":"A","ra":"Personale","du":"Fino a 8 ore","co":"V","de":"L'incantatore passa nel Piano Etereo di confine. Può muoversi in qualsiasi direzione, attraversando oggetti e creature sul Piano Materiale, ma non può influenzarli né essere influenzato da loro (tranne che da effetti specifici). Al termine dell'incantesimo, l'incantatore torna sul Piano Materiale nello spazio occupato o in quello libero più vicino.\n\nA livelli superiori: L'uso di slot di livello superiore permette di influenzare fino a tre creature consenzienti aggiuntive per ogni livello sopra il 7°.","rituale":false},"fiamma perenne":{"it":"Fiamma Perenne","lv":2,"sc":"Invocazione","ca":"A","ra":"Contatto","du":"Finché non viene dissolto","co":"V,S,M (polvere di rubino del valore di 50 mo, che l'incantesimo consuma)","de":"Una fiamma di intensità equivalente a quella di una torcia si sprigiona da un oggetto toccato dall'incantatore. L'effetto è quello di una fiamma comune, ma non crea calore e non utilizza ossigeno. Una fiamma perenne può essere coperta o nascosta, ma non soffocata o estinta.","rituale":false},"fiamma sacra":{"it":"Fiamma Sacra","lv":0,"sc":"Invocazione","ca":"A","ra":"18 metri","du":"Istantanea","co":"V,S","de":"Radiazioni simili a fiamme scendono su una creatura entro gittata che l'incantatore sia in grado di vedere. Il bersaglio deve superare un tiro salvezza su Destrezza o subire 1d8 danni radiosi. Il bersaglio non ottiene alcun beneficio dalla copertura per questo tiro salvezza.\n\nA livelli superiori: I danni aumentano di 1d8 al 5° livello (2d8), 11° livello (3d8) e 17° livello (4d8).","rituale":false},"frantumare":{"it":"Frantumare","lv":2,"sc":"Invocazione","ca":"A","ra":"18 metri","du":"Istantanea","co":"V,S,M (un frammento di mica)","de":"Un rumore improvviso e assordante si diffonde da un punto entro gittata. Ogni creatura entro una sfera di 3 metri di raggio deve effettuare un tiro salvezza su Costituzione. In caso di fallimento, subisce 3d8 danni da tuono, o la metà in caso di successo. Creature fatte di materiale inorganico (pietra, cristallo, metallo) hanno svantaggio al tiro. Un oggetto non magico non indossato nell'area subisce i danni.\n\nA livelli superiori: I danni aumentano di 1d8 per ogni slot superiore al 2°.","rituale":false},"invisibilità superiore":{"it":"Invisibilità Superiore","lv":4,"sc":"Illusione","ca":"A","ra":"Contatto","du":"Concentrazione, fino a 1 minuto","co":"V,S","de":"L'incantatore o una creatura da lui toccata diventa invisibile fino al termine dell'incantesimo. Ciò accade anche a tutto ciò che il bersaglio indossa o trasporta, sempre che non se ne separi. A differenza dell'invisibilità standard, questo incantesimo non termina se il bersaglio attacca o lancia un incantesimo.","rituale":false},"invocare il fulmine":{"it":"Invocare il Fulmine","lv":3,"sc":"Evocazione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 10 minuti","co":"V","de":"Una nube di tempesta appare sopra l'incantatore. Finché l'incantesimo dura, l'incantatore può usare un'azione per far cadere un fulmine in un punto entro gittata. Ogni creatura entro 1,5 metri deve superare un tiro salvezza su Destrezza o subire 3d10 danni da fulmine (metà se lo supera). Se l'incantatore è già all'aperto sotto una tempesta, i danni aumentano di 1d10.\n\nA livelli superiori: I danni aumentano di 1d10 per ogni slot superiore al 3°.","rituale":false},"luce diurna":{"it":"Luce Diurna","lv":3,"sc":"Invocazione","ca":"A","ra":"18 metri","du":"1 ora","co":"V","de":"Una sfera di luce si espande in un raggio di 18 metri da un punto scelto. La sfera emette luce intensa e poi luce fioca per ulteriori 18 metri. Se il punto è un oggetto impugnato o non trasportato, la luce si muove con esso. L'oscurità magica di livello pari o inferiore al 3° viene dissolta se si sovrappone a questa luce.","rituale":false},"luci danzanti":{"it":"Luci Danzanti","lv":0,"sc":"Invocazione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S,M (un frammento di fosforo, di legno wych o una lucciola)","de":"L'incantatore crea fino a quattro luci delle dimensioni di una torcia entro gittata, che possono apparire come globi, lanterne o una forma vagamente umanoide. Le luci emettono luce fioca in un raggio di 3 metri. Con un'azione bonus, l'incantatore può muoverle fino a 18 metri in un punto entro gittata; le luci devono restare entro 6 metri l'una dall'altra.","rituale":false},"muro di forza":{"it":"Muro di Forza","lv":5,"sc":"Evocazione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 10 minuti","co":"V,S,M (un pizzico di polvere di diamante)","de":"Un muro di forza invisibile si materializza in un punto a scelta. Può essere una cupola (raggio 3m) o una superficie piatta di dieci pannelli (3m x 3m). Il muro ha uno spessore di 0,6 cm. Nulla può attraversare fisicamente il muro, che è immune ai danni e non può essere dissolto da 'Dissolvi Magie', ma viene distrutto da 'Disintegrazione'.","rituale":false},"palla di fuoco":{"it":"Palla di Fuoco","lv":3,"sc":"Invocazione","ca":"A","ra":"45 metri","du":"Istantanea","co":"V,S,M (una pallina di guano di pipistrello e zolfo)","de":"Una scia di luce sfreccia dall'indice dell'incantatore fino a un punto scelto, provocando un'esplosione. Ogni creatura entro una sfera di 6 metri di raggio deve effettuare un tiro salvezza su Destrezza. Subisce 8d6 danni da fuoco in caso di fallimento, o la metà in caso di successo. Il fuoco si diffonde oltre gli angoli e incendia oggetti infiammabili.\n\nA livelli superiori: I danni aumentano di 1d6 per ogni slot superiore al 3°.","rituale":false},"parola guaritrice di massa":{"it":"Parola Guaritrice di Massa","lv":3,"sc":"Invocazione","ca":"AB","ra":"18 metri","du":"Istantanea","co":"V","de":"L'incantatore pronuncia parole di guarigione e fino a sei creature a scelta entro gittata recuperano punti ferita pari a 1d4 + il modificatore di caratteristica da incantatore. L'incantesimo non ha effetto su non morti o costrutti.\n\nA livelli superiori: La guarigione aumenta di 1d4 per ogni slot superiore al 3°.","rituale":false},"mano magica":{"it":"Mano Magica","lv":0,"sc":"Evocazione","ca":"A","ra":"9 metri","du":"1 minuto","co":"V,S","de":"Una mano spettrale e fluttuante appare in un punto scelto dall'incantatore entro gittata. La mano permane per la durata dell'incantesimo o finché l'incantatore non la congeda con un'azione. La mano svanisce se si trova a più di 9 metri dall'incantatore o se quest'ultimo lancia di nuovo l'incantesimo. L'incantatore può usare la sua azione per controllare la mano. Può usarla per manipolare un oggetto, aprire uno sportello o un contenitore non chiuso a chiave, riporre o estrarre un oggetto da un contenitore aperto o versare il contenuto di una fiala. Ogni volta che la usa, l'incantatore può muovere la mano di un massimo di 9 metri. La mano non può attaccare, attivare oggetti magici o sollevare più di 4,5 kg.","rituale":false},"messaggio":{"it":"Messaggio","lv":0,"sc":"Trasmutazione","ca":"A","ra":"36 metri","du":"1 round","co":"V,S,M (un breve pezzo di filo di rame)","de":"L'incantatore punta il dito verso una creatura entro gittata e sussurra un messaggio. Il bersaglio (e solo lui) sente il messaggio e può rispondere con un sussurro che solo l'incantatore può sentire. L'incantatore può lanciare questo incantesimo attraverso gli oggetti solidi se ha familiarità con il bersaglio e sa che si trova oltre l'oggetto. Il silenzio magico, 30 cm di pietra, 2,5 cm di metallo comune, un sottile foglio di piombo o 90 cm di legno o terra bloccano l'incantesimo. L'incantesimo non deve necessariamente seguire una linea retta e può aggirare gli angoli o passare attraverso le aperture.","rituale":false},"mimetismo":{"it":"Mimetismo","lv":2,"sc":"Abiurazione","ca":"A","ra":"Personale","du":"Concentrazione, fino a 1 ora","co":"V,S,M (cenere di foglie di vischio bruciate e un rametto di abete)","de":"Un velo di ombre e silenzio si stende sull'incantatore, rendendolo più difficile da individuare. Per la durata dell'incantesimo, l'incantatore ha un bonus di +10 alle prove di Destrezza (Furtività) e non può essere tracciato se non con mezzi magici. Non lascia impronte o altre tracce del suo passaggio.","rituale":false},"muro di fuoco":{"it":"Muro di Fuoco","lv":4,"sc":"Invocazione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S,M (un pezzetto di fosforo)","de":"L'incantatore crea un muro di fiamme ruggenti su una superficie solida entro gittata. Può scegliere di creare un muro lungo fino a 18 metri, alto 6 metri e spesso 30 cm, oppure un muro circolare del diametro di 6 metri, alto 6 metri e spesso 30 cm. Il muro è opaco e permane per la durata dell'incantesimo. Quando il muro appare, ogni creatura all'interno della sua area deve effettuare un tiro salvezza su Destrezza; se lo fallisce, subisce 5d8 danni da fuoco, mentre se lo supera, subisce la metà di quei danni. Un lato del muro, scelto dall'incantatore al momento del lancio, infligge 5d8 danni da fuoco a ogni creatura che termina il suo turno entro 3 metri da quel lato o all'interno del muro. Una creatura subisce lo stesso danno quando entra nel muro per la prima volta in un turno o vi termina il turno. L'altro lato del muro non infligge danni.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 5° livello o superiore, i danni aumentano di 1d8 per ogni slot di livello superiore al 4°.","rituale":false},"muro di pietra":{"it":"Muro di Pietra","lv":5,"sc":"Invocazione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 10 minuti","co":"V,S,M (un piccolo blocco di granito)","de":"L'incantatore crea un muro di pietra solida su un punto che egli sceglie entro gittata su una superficie solida. Il muro è spesso 15 cm ed è composto da dieci pannelli di 3 x 3 metri. Ogni pannello deve essere adiacente ad almeno un altro pannello. Se il muro taglia lo spazio di una creatura quando appare, la creatura viene spinta da un lato del muro. Se la creatura è circondata dal muro, può effettuare un tiro salvezza su Destrezza per spostarsi prima che il muro sia completato. Il muro è un oggetto fatto di pietra che può essere danneggiato e varcato. Ogni pannello ha CA 15 e 30 punti ferita per ogni 2,5 cm di spessore. Se l'incantatore mantiene la concentrazione per l'intera durata, il muro diventa permanente.","rituale":false},"nebbia oscurante":{"it":"Nebbia Oscurante","lv":1,"sc":"Evocazione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 1 ora","co":"V,S","de":"L'incantatore crea una sfera di nebbia del raggio di 6 metri centrata su un punto entro gittata. La sfera si propaga oltre gli angoli e la sua area è pesantemente oscurata. La nebbia permane per la durata dell'incantesimo o finché un vento moderato (almeno 15 km orari) non la disperde.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 2° livello o superiore, il raggio della nebbia aumenta di 6 metri per ogni slot di livello superiore al 1°.","rituale":false},"onda tonante":{"it":"Onda Tonante","lv":1,"sc":"Invocazione","ca":"A","ra":"Personale (cubo di 4,5 metri)","du":"Istantanea","co":"V,S","de":"Un'ondata di forza tonante si sprigiona dall'incantatore. Ogni creatura entro un cubo di 4,5 metri di spigolo originato dall'incantatore deve effettuare un tiro salvezza su Costituzione. Se lo fallisce, subisce 2d8 danni da tuono e viene spinta a 3 metri di distanza dall'incantatore. Se lo supera, subisce la metà dei danni e non viene spinta. Inoltre, gli oggetti non magici che si trovano interamente nell'area di effetto vengono spinti a 3 metri di distanza dall'incantatore per effetto dell'incantesimo e l'incantesimo emette un tuono tonante udibile fino a 90 metri di distanza.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 2° livello o superiore, i danni aumentano di 1d8 per ogni slot di livello superiore al 1°.","rituale":false},"oscurità":{"it":"Oscurità","lv":2,"sc":"Invocazione","ca":"A","ra":"18 metri","du":"Concentrazione, fino a 10 minuti","co":"V,M (un pizzico di pelliccia di pipistrello e un po' di catrame o un pezzetto di carbone)","de":"Un'oscurità magica si diffonde da un punto scelto dall'incantatore entro gittata fino a riempire una sfera del raggio di 4,5 metri per la durata dell'incantesimo. L'oscurità si propaga oltre gli angoli. Una creatura dotata di scurovisione non può vedere attraverso questa oscurità e la luce non magica non può illuminarla. Se l'incantatore sceglie un punto su un oggetto che impugna o che non è indossato o trasportato da un altro, l'oscurità si sprigiona dall'oggetto e si muove con esso. Coprire completamente l'oggetto con un materiale opaco blocca l'oscurità. Se una qualsiasi area di questo incantesimo si sovrappone a un'area di luce creata da un incantesimo di 2° livello o inferiore, l'incantesimo che ha creato la luce viene dissolto.","rituale":false},"parola guaritrice":{"it":"Parola Guaritrice","lv":1,"sc":"Invocazione","ca":"AB","ra":"18 metri","du":"Istantanea","co":"V","de":"Una creatura a scelta dell'incantatore, situata entro la gittata e che egli sia in grado di vedere, recupera un ammontare di punti ferita pari a 1d4 + il modificatore della caratteristica da incantatore dell'incantatore. Questo incantesimo non ha effetto su non morti o costrutti.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 2° livello o superiore, la guarigione aumenta di 1d4 per ogni slot di livello superiore al 1°.","rituale":false},"passo veloce":{"it":"Passo Veloce","lv":2,"sc":"Trasmutazione","ca":"AB","ra":"Personale","du":"Istantanea","co":"V","de":"L'incantatore viene avvolto da una nebbia argentea e si teletrasporta in uno spazio libero situato entro 9 metri da lui e che egli sia in grado di vedere.","rituale":false},"pelle di pietra":{"it":"Pelle di Pietra","lv":4,"sc":"Abiurazione","ca":"A","ra":"Contatto","du":"Concentrazione, fino a 1 ora","co":"V,S,M (polvere di diamante del valore di almeno 100 mo, che l'incantesimo consuma)","de":"Questo incantesimo rende la pelle di una creatura consenziente toccata dall'incantatore dura come la pietra. Finché l'incantesimo non termina, il bersaglio ha resistenza ai danni contundenti, perforanti e taglienti non magici.","rituale":false},"raggio di gelo":{"it":"Raggio di Gelo","lv":0,"sc":"Invocazione","ca":"A","ra":"18 metri","du":"Istantanea","co":"V,S","de":"Un raggio di luce gelida e biancastra sfreccia verso una creatura entro gittata. L'incantatore effettua un attacco incantesimo a distanza contro il bersaglio. Se lo colpisce, il bersaglio subisce 1d8 danni da freddo e la sua velocità è ridotta di 3 metri fino all'inizio del turno successivo dell'incantatore.\n\nA livelli superiori: I danni di questo incantesimo aumentano di 1d8 quando l'incantatore raggiunge il 5° livello (2d8), l'11° livello (3d8) e il 17° livello (4d8).","rituale":false},"raggio rovente":{"it":"Raggio Rovente","lv":2,"sc":"Invocazione","ca":"A","ra":"36 metri","du":"Istantanea","co":"V,S","de":"L'incantatore crea tre raggi di fuoco e li scaglia contro alcuni bersagli entro gittata. Può scagliarli tutti contro un solo bersaglio o contro bersagli diversi. L'incantatore effettua un attacco incantesimo a distanza per ogni raggio. Se un raggio colpisce, il bersaglio subisce 2d6 danni da fuoco.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 3° livello o superiore, crea un raggio aggiuntivo per ogni slot di livello superiore al 2°.","rituale":false},"rianimare morti":{"it":"Rianimare Morti","lv":5,"sc":"Necromanzia","ca":"special","ra":"Contatto","du":"Istantanea","co":"V,S,M (un diamante del valore di almeno 500 mo, che l'incantesimo consuma)","de":"L'incantatore tocca una creatura morta da non più di 10 giorni. Se l'anima della creatura è consenziente e libera, la creatura torna in vita con 1 punto ferita. Questo incantesimo cura tutte le ferite mortali e chiude tutte le piaghe aperte, ma non rigenera le parti del corpo mancanti. Il ritorno dalla morte è un'esperienza traumatica: il bersaglio subisce una penalità di -4 a tutti i tiri per colpire, tiri salvezza e prove di caratteristica. Ogni volta che la creatura termina un riposo lungo, la penalità si riduce di 1 finché non svanisce.","rituale":false},"rigenerazione":{"it":"Rigenerazione","lv":7,"sc":"Trasmutazione","ca":"special","ra":"Contatto","du":"1 ora","co":"V,S,M (una ruota della preghiera e dell'acqua santa)","de":"Una creatura toccata dall'incantatore viene pervasa da un potere curativo. Il bersaglio recupera 4d8 + 15 punti ferita. Per la durata dell'incantesimo, il bersaglio recupera 1 punto ferita all'inizio di ogni suo turno (10 punti ferita al minuto). Le membra recise (dita, gambe, braccia e così via) della creatura, se presenti, vengono riattaccate se tenute contro il troncone. In caso contrario, ricrescono e tornano funzionali dopo 2 minuti.","rituale":false},"rinascita":{"it":"Rinascita","lv":3,"sc":"Necromanzia","ca":"A","ra":"Contatto","du":"Istantanea","co":"V,S,M (diamanti del valore di almeno 300 mo, che l'incantesimo consuma)","de":"L'incantatore tocca una creatura morta da non più di un minuto. Quella creatura torna in vita con 1 punto ferita. Questo incantesimo non può far tornare in vita una creatura morta di vecchiaia e non può rigenerare alcuna parte del corpo mancante.","rituale":false},"scudo":{"it":"Scudo","lv":1,"sc":"Abiurazione","ca":"R","ra":"Personale","du":"1 round","co":"V,S","de":"Una barriera invisibile di forza magica appare e protegge l'incantatore. Fino all'inizio del suo turno successivo, l'incantatore ottiene un bonus di +5 alla CA, incluso contro l'attacco che ha attivato la reazione, e non subisce danni dal dardo incantato.","rituale":false},"sogno":{"it":"Sogno","lv":5,"sc":"Illusione","ca":"special","ra":"Speciale","du":"8 ore","co":"V,S,M (una manciata di sabbia, un pizzico di inchiostro e una piuma per scrivere tolta a un uccello dormiente)","de":"L'incantatore sceglie come bersaglio una creatura che conosce e che si trova sul suo stesso piano di esistenza. L'incantatore, o una creatura consenziente che egli tocca, funge da messaggero. Mentre il bersaglio dorme, il messaggero appare nel sogno del bersaglio e può conversare con lui finché resta addormentato. Il messaggero può anche rendere il sogno un incubo: il bersaglio deve effettuare un tiro salvezza su Saggezza. Se lo fallisce, non ottiene benefici dal riposo e subisce 3d6 danni psichici al risveglio.","rituale":false},"sguardo penetrante":{"it":"Sguardo Penetrante","lv":6,"sc":"Necromanzia","ca":"A","ra":"Personale","du":"Concentrazione, fino a 1 minuto","co":"V,S","de":"Per la durata dell'incantesimo, gli occhi dell'incantatore diventano pozzi di oscurità pieni di un potere spaventoso. Egli può usare un'azione per scegliere una creatura entro 18 metri da lui e che egli sia in grado di vedere e infliggerle uno dei seguenti effetti: Paura (Saggezza o spaventato), Sonno (Saggezza o addormentato), Malessere (Saggezza o svantaggio a tiri per colpire e prove di caratteristica).","rituale":false},"suggestione":{"it":"Suggestione","lv":2,"sc":"Ammaliamento","ca":"A","ra":"9 metri","du":"Concentrazione, fino a 8 ore","co":"V,M (una lingua di serpente e un po' di favo o una goccia d'olio dolce)","de":"L'incantatore suggerisce un corso d'azione (limitato a una o due frasi) e influenza magicamente una creatura entro la gittata che sia in grado di sentirlo e capirlo. Se il bersaglio fallisce un tiro salvezza su Saggezza, segue il corso d'azione suggerito al meglio delle sue capacità. L'azione suggerita deve sembrare ragionevole.","rituale":false},"tempesta di fuoco":{"it":"Tempesta di Fuoco","lv":7,"sc":"Invocazione","ca":"A","ra":"45 metri","du":"Istantanea","co":"V,S","de":"Una tempesta di fiamme ruggenti compare nell'area scelta. L'area è composta da un massimo di dieci cubi con spigolo di 3 metri, disposti come l'incantatore preferisce. Ogni creatura nell'area deve effettuare un tiro salvezza su Destrezza: subisce 7d10 danni da fuoco se fallisce, o la metà se riesce. Il fuoco incendia gli oggetti infiammabili nell'area che non siano indossati o trasportati.","rituale":false},"trasmutare roccia":{"it":"Trasmutare Roccia","lv":5,"sc":"Trasmutazione","ca":"A","ra":"36 metri","du":"Istantanea","co":"V,S,M (argilla e sabbia)","de":"L'incantatore trasforma la roccia non magica in fango o viceversa in un cubo con spigolo di 12 metri. Trasmutare roccia in fango rende il terreno difficile e può intrappolare le creature. Trasmutare fango in roccia può imprigionare le creature che si trovano nel fango: esse devono superare un tiro salvezza su Forza o rimanere intrappolate.","rituale":false},"trova trappole":{"it":"Trova Trappole","lv":2,"sc":"Divinazione","ca":"A","ra":"36 metri","du":"Istantanea","co":"V,S","de":"L'incantatore percepisce la presenza di qualsiasi trappola entro la gittata che si trovi nella sua linea di vista. Una trappola, ai fini di questo incantesimo, include qualsiasi cosa sia stata creata con l'intento di infliggere danni o generare un effetto spiacevole a una creatura che la tocchi o vi passi sopra. L'incantatore apprende la natura del pericolo rappresentato da una trappola che ha individuato, ma non la sua posizione esatta.","rituale":false},"visione del vero":{"it":"Visione del Vero","lv":6,"sc":"Divinazione","ca":"A","ra":"Contatto","du":"1 ora","co":"V,S,M (un unguento per gli occhi del valore di 25 mo a base di polvere di funghi, zafferano e grasso, che l'incantesimo consuma)","de":"L'incantatore tocca una creatura consenziente e le conferisce la capacità di vedere le cose come sono realmente. Per la durata, la creatura ha visione del vero entro 36 metri, vede attraverso l'oscurità magica e non magica, nota porte segrete nascoste dalla magia e vede la forma originale dei mutaforma.","rituale":false},"vuoto mentale":{"it":"Vuoto Mentale","lv":8,"sc":"Abiurazione","ca":"A","ra":"Contatto","du":"24 ore","co":"V,S","de":"Una creatura consenziente toccata dall'incantatore è immune ai danni psichici, a qualsiasi effetto che possa percepirne le emozioni o leggerne i pensieri, agli incantesimi di divinazione e alla condizione affascinato. L'incantesimo annulla perfino gli incantesimi desiderio e gli incantesimi o effetti di potenza analoga usati per influenzare la mente del bersaglio.","rituale":false},"zona di verità":{"it":"Zona di Verità","lv":2,"sc":"Ammaliamento","ca":"A","ra":"18 metri","du":"10 minuti","co":"V,S","de":"L'incantatore crea una zona magica che protegge dagli inganni all'interno di una sfera con raggio di 4,5 metri centrata su un punto entro gittata. Una creatura che entra nell'area per la prima volta in un turno o vi inizia il turno deve superare un TS su Carisma. Se lo fallisce, non può mentire deliberatamente. L'incantatore sa chi ha superato o fallito il tiro.","rituale":false}};
const SRD24={"aiuto":{"it":"Aiuto","lv":2,"sc":"Abiurazione","ca":"A","ra":"9 metri","du":"8 ore","co":"V,S,M (una sottile striscia di stoffa bianca)","de":"L'incantatore invoca una benedizione che rinvigorisce i suoi alleati. Sceglie fino a tre creature entro gittata. Il massimo dei punti ferita e i punti ferita attuali di ogni bersaglio aumentano di 5 per la durata dell'incantesimo.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 3º livello o superiore, i punti ferita dei bersagli aumentano di altri 5 per ogni livello dello slot sopra il 2º.","rituale":false},"allarme":{"it":"Allarme","lv":1,"sc":"Abiurazione","ca":"special","ra":"9 metri","du":"8 ore","co":"V,S,M (un minuscolo campanello e un sottile filo d'argento)","de":"L'incantatore imposta un allarme per rilevare le intrusioni. Sceglie una porta, una finestra o un'area entro gittata che non superi un cubo con spigolo di 6 metri. Finché l'incantesimo non termina, un allarme avvisa l'incantatore ogni volta che una creatura Minuscola o più grande entra nell'area o la attraversa. L'incantatore sceglie se l'allarme debba essere mentale o acustico.","rituale":true},"allucinazione mortale":{"it":"Allucinazione Mortale","lv":4,"sc":"Illusione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S","de":"L'incantatore attinge alle paure più profonde di una creatura che egli è in grado di vedere entro gittata e crea un'illusione che solo essa può vedere. Il bersaglio deve effettuare un tiro salvezza su Saggezza. Se lo fallisce, diventa spaventato per la durata dell'incantesimo. Alla fine di ogni turno del bersaglio, esso deve superare un tiro salvezza su Saggezza o subire 4d10 danni psichici.\n\nA livelli superiori: Il danno aumenta di 1d10 per ogni livello dello slot sopra il 4º.","rituale":false},"amicizia":{"it":"Amicizia","lv":0,"sc":"Ammaliamento","ca":"A","ra":"Personale","du":"Concentrazione, fino a 1 minuto","co":"S,M (un po' di trucco applicato sul volto durante il lancio)","de":"Per la durata dell'incantesimo, l'incantatore dispone di vantaggio a tutte le prove di Carisma dirette a una creatura a sua scelta che non sia ostile nei suoi confronti. Quando l'incantesimo termina, la creatura si rende conto che l'incantatore ha usato la magia per influenzare il suo umore e diventa ostile.","rituale":false},"amicizia animale":{"it":"Amicizia Animale","lv":1,"sc":"Ammaliamento","ca":"A","ra":"9 metri","du":"24 ore","co":"V,S,M (un pizzico di cibo per animali)","de":"L'incantatore convince un animale di non avere intenzioni ostili. Sceglie una bestia entro gittata che sia in grado di vederlo e sentirlo. Se l'Intelligenza della bestia è pari o superiore a 4, l'incantesimo fallisce. Altrimenti, la bestia deve superare un tiro salvezza su Saggezza o essere affascinata dall'incantatore per la durata dell'incantesimo.\n\nA livelli superiori: L'incantatore può colpire una bestia aggiuntiva per ogni livello dello slot sopra il 1º.","rituale":false},"analizzare natura":{"it":"Analizzare Natura","lv":1,"sc":"Divinazione","ca":"A","ra":"Contatto","du":"Istantanea","co":"V,S,M (una perla del valore di almeno 100 mo e una piuma di gufo)","de":"L'incantatore sceglie un oggetto o una creatura. Se tocca un oggetto, ne apprende le proprietà magiche e come utilizzarle, incluse eventuali cariche o requisiti di sintonia. Se tocca una creatura, apprende quali incantesimi la stanno influenzando.","rituale":true},"anatema":{"it":"Anatema","lv":1,"sc":"Ammaliamento","ca":"A","ra":"9 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S,M (una goccia di sangue)","de":"L'incantatore tenta di maledire fino a tre creature. Ogni bersaglio deve effettuare un tiro salvezza su Carisma. Se lo fallisce, deve sottrarre 1d4 a ogni tiro per colpire o tiro salvezza effettuato prima del termine dell'incantesimo.\n\nA livelli superiori: L'incantatore può colpire una creatura aggiuntiva per ogni livello dello slot sopra il 1º.","rituale":false},"animare morti":{"it":"Animare Morti","lv":3,"sc":"Necromanzia","ca":"special","ra":"3 metri","du":"Istantanea","co":"V,S,M (una goccia di sangue, un pezzetto di carne e un pizzico di polvere d'osso)","de":"Questo incantesimo crea un servitore non morto. L'incantatore sceglie un mucchio di ossa o un corpo di un umanoide Medio o Piccolo entro gittata. L'incantesimo infonde al bersaglio un'imitazione corrotta della vita, facendolo risorgere come uno scheletro (se sono state scelte delle ossa) o come uno zombi (se è stato scelto un corpo).\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 4º livello o superiore, anima o riafferma il controllo su due creature non morte aggiuntive per ogni livello dello slot sopra il 3º.","rituale":false},"animare oggetti":{"it":"Animare Oggetti","lv":5,"sc":"Trasmutazione","ca":"A","ra":"36 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S","de":"Gli oggetti prendono vita al comando dell'incantatore. Sceglie fino a dieci oggetti non magici entro gittata che non siano indossati o trasportati. Bersagli di taglia Media contano come due oggetti, taglia Grande come quattro, taglia Enorme come otto. L'incantatore non può animare oggetti di taglia Mastodontica.\n\nA livelli superiori: Se l'incantatore lancia questo incantesimo usando uno slot incantesimo di 6º livello o superiore, può animare due oggetti aggiuntivi per ogni livello dello slot sopra il 5º.","rituale":false},"antipatia/simpatia":{"it":"Antipatia/Simpatia","lv":8,"sc":"Ammaliamento","ca":"A","ra":"18 metri","du":"10 giorni","co":"V,S,M (un grumo di allume imbevuto nell'aceto per l'antipatia o una goccia di miele per la simpatia)","de":"L'incantatore attira o respinge creature di un tipo specifico verso un oggetto o un'area. Sceglie un tipo di creatura (come draghi, folletti o non morti) e un oggetto o un'area. Sceglie poi tra Antipatia (la creatura deve fuggire) o Simpatia (la creatura è attratta e vuole stare vicino all'obiettivo).","rituale":false},"apertura":{"it":"Apertura","lv":2,"sc":"Trasmutazione","ca":"A","ra":"18 metri","du":"Istantanea","co":"V","de":"L'incantatore sceglie un oggetto entro gittata. L'oggetto può essere una porta, una scatola, un baule, un paio di manette, un lucchetto o un altro oggetto che contenga un meccanismo di chiusura mondano o magico. Se l'oggetto è chiuso da un lucchetto mondano, questo si sblocca. Se è chiuso magicamente da Serratura Arcana, l'incantesimo viene soppresso per 10 minuti.","rituale":false},"appiccare fuoco":{"it":"Appiccare Fuoco","lv":0,"sc":"Invocazione","ca":"A","ra":"Personale","du":"Istantanea","co":"V,S","de":"Una fiammata si sprigiona dalla mano dell'incantatore. Ogni creatura entro un cubo di 1,5 metri deve superare un tiro salvezza su Destrezza o subire 1d10 danni da fuoco. Questo incantesimo incendia gli oggetti infiammabili nell'area che non sono indossati o trasportati.\n\nA livelli superiori: Il danno dell'incantesimo aumenta di 1d10 quando l'incantatore raggiunge il 5º livello (2d10), l'11º livello (3d10) e il 17º livello (4d10).","rituale":false},"occhio arcano":{"it":"Occhio Arcano","lv":4,"sc":"Divinazione","ca":"A","ra":"9 metri","du":"Concentrazione, fino a 1 ora","co":"V,S,M (un pizzico di pelliccia di pipistrello)","de":"L'incantatore crea un occhio invisibile e fluttuante che si muove al suo comando. L'occhio ha scurovisione fino a 9 metri e può muoversi in ogni direzione. L'incantatore riceve mentalmente le informazioni visive dall'occhio.","rituale":false},"arma spirituale":{"it":"Arma Spirituale","lv":2,"sc":"Evocazione","ca":"AB","ra":"18 metri","du":"1 minuto","co":"V,S","de":"L'incantatore crea un'arma spettrale fluttuante che attacca i suoi nemici. Quando lancia l'incantesimo, può effettuare un attacco incantesimo in mischia contro una creatura entro 1,5 metri dall'arma. Se colpisce, il bersaglio subisce danni da forza pari a 1d8 + il modificatore della caratteristica da incantatore.\n\nA livelli superiori: Quando l'incantatore lancia questo incantesimo usando uno slot incantesimo di 3º livello o superiore, il danno aumenta di 1d8 per ogni due livelli dello slot sopra il 2º.","rituale":false},"armatura di agathys":{"it":"Armatura di Agathys","lv":1,"sc":"Abiurazione","ca":"A","ra":"Personale","du":"1 ora","co":"V,S,M (una tazza d'acqua)","de":"Una forza magica protettiva circonda l'incantatore, manifestandosi come un gelo spettrale. Guadagna 5 punti ferita temporanei. Se una creatura colpisce l'incantatore con un attacco in mischia mentre ha questi punti ferita, subisce 5 danni da freddo.\n\nA livelli superiori: Sia i punti ferita temporanei che i danni da freddo aumentano di 5 per ogni livello dello slot sopra il 1º.","rituale":false},"armatura magica":{"it":"Armatura Magica","lv":1,"sc":"Abiurazione","ca":"A","ra":"Contatto","du":"8 ore","co":"V,S,M (un pezzetto di cuoio conciato)","de":"L'incantatore tocca una creatura consenziente che non indossa armatura. Finché l'incantesimo non termina, la CA base del bersaglio diventa 13 + il suo modificatore di Destrezza. L'incantesimo termina se il bersaglio indossa un'armatura o se l'incantatore lo interrompe come azione.","rituale":false},"astuzia della volpe (splendore dell'aquila)":{"it":"Astuzia della Volpe (Splendore dell'Aquila)","lv":2,"sc":"Trasmutazione","ca":"A","ra":"Contatto","du":"Concentrazione, fino a 1 ora","co":"V,S,M (peli o piume di un animale)","de":"L'incantatore infonde a una creatura la resistenza o l'abilità di una bestia. Sceglie uno dei seguenti effetti: Forza del Toro, Grazia del Gatto, Costituzione dell'Orso, Astuzia della Volpe, Saggezza del Gufo o Splendore dell'Aquila. Il bersaglio ottiene vantaggio alle prove relative alla caratteristica scelta.\n\nA livelli superiori: Puoi colpire una creatura aggiuntiva per ogni livello dello slot sopra il 2º.","rituale":false},"attutire caduta":{"it":"Attutire Caduta","lv":1,"sc":"Trasmutazione","ca":"R","ra":"18 metri","du":"1 minuto","co":"M (una piccola piuma o del piumino)","de":"Sceglie fino a cinque creature che cadono entro gittata. La velocità di caduta dei bersagli scende a 18 metri per round. Se il bersaglio atterra prima del termine, non subisce danni dalla caduta e atterra in piedi.","rituale":false},"augurio":{"it":"Augurio","lv":2,"sc":"Divinazione","ca":"special","ra":"Personale","du":"Istantanea","co":"V,S,M (bastoncini, ossa o carte contrassegnate del valore di almeno 25 mo)","de":"Interrogando entità extraplanari, l'incantatore riceve un presagio su un'azione specifica che intende compiere entro i successivi 30 minuti. Il DM sceglie tra: Bene, Male, Bene e Male, Nulla.","rituale":true},"aura di purezza":{"it":"Aura di Purezza","lv":4,"sc":"Abiurazione","ca":"A","ra":"Personale (9 metri)","du":"Concentrazione, fino a 10 minuti","co":"V","de":"Un'energia purificatrice si irradia dall'incantatore in un raggio di 9 metri. Per la durata, le creature non ostili nell'aura non possono contrarre malattie, hanno resistenza ai danni da veleno e vantaggio ai tiri salvezza contro effetti che le renderebbero accecate, affascinate, assordate, spaventate, paralizzate, avvelenate o stordite.","rituale":false},"aura di vitalità":{"it":"Aura di Vitalità","lv":3,"sc":"Evocazione","ca":"A","ra":"Personale (9 metri)","du":"Concentrazione, fino a 1 minuto","co":"V","de":"Un'aura di energia curativa si sprigiona dall'incantatore. Finché l'incantesimo non termina, l'incantatore può usare un'azione bonus nel suo turno per far recuperare 2d6 punti ferita a una creatura entro l'aura (incluso se stesso).","rituale":false},"aura santuario":{"it":"Aura Santuario","lv":5,"sc":"Abiurazione","ca":"A","ra":"Personale (9 metri)","du":"Concentrazione, fino a 1 minuto","co":"V","de":"Una luce sacra si sprigiona dall'incantatore. Le creature non ostili entro 9 metri hanno vantaggio a tutti i tiri salvezza, e le creature demoniache o non morte hanno svantaggio ai tiri per colpire contro di esse.","rituale":false},"bacche buone":{"it":"Bacche Buone","lv":1,"sc":"Trasmutazione","ca":"A","ra":"Contatto","du":"Istantanea","co":"V,S,M (un rametto di vischio)","de":"Appaiono fino a dieci bacche nella mano dell'incantatore. Una creatura può usare la sua azione per mangiare una bacca. Mangiare una bacca fa recuperare 1 punto ferita e fornisce nutrimento sufficiente per un giorno intero.","rituale":false},"banchetto degli eroi":{"it":"Banchetto degli Eroi","lv":6,"sc":"Evocazione","ca":"A","ra":"9 metri","du":"Istantanea","co":"V,S,M (un calice incrostato di gemme del valore di almeno 1.000 mo (consumato))","de":"L'incantatore evoca un banchetto magnifico. Fino a dodici creature possono banchettare per un'ora. I partecipanti ottengono: immunità al veleno e alla condizione spaventato, vantaggio ai tiri salvezza su Saggezza e un aumento di 2d10 punti ferita massimi per 24 ore.","rituale":false},"bastone incantato":{"it":"Bastone Incantato","lv":0,"sc":"Trasmutazione","ca":"AB","ra":"Contatto","du":"1 minuto","co":"V,S,M (vischio, una foglia di trifoglio e un bastone o un randello di legno)","de":"L'incantatore infonde il potere della natura in un bastone o un randello che impugna. Per la durata, può usare la sua caratteristica da incantatore anziché la Forza per i tiri per colpire e per i danni degli attacchi in mischia effettuati con quell'arma, e il dado del danno dell'arma diventa un d8. L'arma diventa inoltre magica.","rituale":false},"benedizione":{"it":"Benedizione","lv":1,"sc":"Ammaliamento","ca":"A","ra":"9 metri","du":"Concentrazione, fino a 1 minuto","co":"V,S,M (una goccia di acqua santa)","de":"L'incantatore benedice fino a tre creature a sua scelta entro gittata. Ogni volta che un bersaglio effettua un tiro per colpire o un tiro salvezza prima del termine dell'incantesimo, può tirare un d4 e aggiungere il risultato al tiro.\n\nA livelli superiori: L'incantatore può colpire una creatura aggiuntiva per ogni livello dello slot sopra il 1º.","rituale":false},"bocca magica":{"it":"Bocca Magica","
